          {/* Override 통계 */}
          <div style={{padding:10,borderRadius:C.r.sm,background:"#FFFBEB",border:"1px solid #FCD34D",marginTop:8,fontSize:11,color:"#92400E",lineHeight:1.6}}>
            <span>{"Override 발생: "+RESOLVED.filter(function(r){return r.override;}).length+"건 / 전체 "+RESOLVED.length+"건 ("+Math.round(RESOLVED.filter(function(r){return r.override;}).length/RESOLVED.length*100)+"%). Override 이력은 감사 대응 시 최우선 검토 대상입니다."}</span>
          </div>
        </div>}

        {/* ═══ 정책 규칙 ═══ */}
        {tab==="policies"&&<div>
          <div style={{fontSize:13,fontWeight:600,color:C.t1,marginBottom:4}}>Stop Code 정책 규칙</div>
          <div style={{fontSize:11,color:C.t3,marginBottom:12}}>Code Set Definition v1.1 · Severity 4단계 (Low/Medium/High/Critical)</div>

          {POLICIES.map(function(p,i){
            var sv=sevStyle(p.severity);
            return(
              <div key={i} style={{padding:12,borderRadius:C.r.md,background:C.bg,border:"1px solid "+C.bl,marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:13,fontWeight:600,color:C.t1}}>{p.name}</span>
                    <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:9999,color:sv.fg,background:sv.bg}}>{p.severity}</span>
                    {p.auto&&<span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:9999,color:"#166534",background:"#F0FDF4"}}>자동</span>}
                  </div>
                  <span style={{fontSize:10,color:C.t3}}>{p.code}</span>
                </div>
                <div style={{display:"flex",gap:16,fontSize:12,marginBottom:4}}>
                  <div><span style={{color:C.t3}}>{"Trigger: "}</span><span style={{color:C.t1}}>{p.trigger}</span></div>
                </div>
                <div style={{display:"flex",gap:16,fontSize:12}}>
                  <div><span style={{color:C.t3}}>{"Action: "}</span><span style={{color:sv.fg,fontWeight:500}}>{p.action}</span></div>
                  <span style={{fontSize:10,color:C.t3}}>{"엔진: "+p.engine}</span>
                </div>
              </div>
            );
          })}

          {/* Hard-Stop 예외 (§5.3) */}
          <div style={{padding:12,borderRadius:C.r.md,background:"#7F1D1D",border:"2px solid #991B1B",marginTop:8}}>
            <div style={{fontSize:12,fontWeight:700,color:"#FFF",marginBottom:6}}>Critical Hard Stop 예외 (즉시 차단)</div>
            <div style={{fontSize:11,color:"#FCA5A5",lineHeight:1.8}}>
              <div>1. 법적 거래 금지 품목 거래 시도</div>
              <div>2. 제재/블랙리스트 공급사 거래 시도</div>
              <div>3. 시스템 보안 침해 의심 상황</div>
              <div>4. 재무 승인 구조 완전 부재 상태</div>
              <div style={{marginTop:4,fontWeight:600}}>{"→ Critical Class · Hard-Stop 유일 적용 대상"}</div>
            </div>
          </div>
        </div>}

        {/* ═══ 전체 현황 ═══ */}
        {tab==="overview"&&<div>
          {/* KPI */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:16}}>
            <div style={{padding:14,borderRadius:C.r.md,background:"#FEF2F2",border:"1px solid #FCA5A5",textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:700,color:"#991B1B"}}>{ACTIVE_EVENTS.length}</div>
              <div style={{fontSize:11,color:"#991B1B"}}>활성 Stop</div>
            </div>
            <div style={{padding:14,borderRadius:C.r.md,background:"#FFFBEB",border:"1px solid #FCD34D",textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:700,color:"#92400E"}}>{ACTIVE_EVENTS.filter(function(e){return e.escalated;}).length}</div>
              <div style={{fontSize:11,color:"#92400E"}}>Escalated</div>
            </div>
            <div style={{padding:14,borderRadius:C.r.md,background:"#F0FDF4",border:"1px solid #86EFAC",textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:700,color:"#166534"}}>{RESOLVED.length}</div>
              <div style={{fontSize:11,color:"#166534"}}>해제 완료</div>
            </div>
            <div style={{padding:14,borderRadius:C.r.md,background:"#EFF6FF",border:"1px solid #93C5FD",textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:700,color:"#1E40AF"}}>1.8일</div>
              <div style={{fontSize:11,color:"#1E40AF"}}>평균 해제</div>
            </div>
          </div>

          {/* Severity 분포 (§6 4단계) */}
          <div style={{fontSize:13,fontWeight:600,color:C.t1,marginBottom:8}}>Severity 분포 (UI Flag §6)</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:16}}>
            {["Critical","High","Medium","Low"].map(function(s){
              var sv=SEV4[s];
              var cnt=ACTIVE_EVENTS.filter(function(e){return e.severity===s;}).length+RESOLVED.filter(function(r){return r.severity===s;}).length;
              return <div key={s} style={{padding:10,borderRadius:C.r.md,background:sv.bg,border:"1px solid "+sv.bd,textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:700,color:sv.fg}}>{cnt}</div>
                <div style={{fontSize:10,color:sv.fg}}>{sv.label}</div>
              </div>;
            })}
          </div>

          {/* 분류 체계 */}
          <div style={{fontSize:13,fontWeight:600,color:C.t1,marginBottom:8}}>Stop Code 분류 체계 (§6)</div>
          {STOP_CLASSES.map(function(cls,i){return(
            <div key={i} style={{padding:12,borderRadius:C.r.md,background:cls.color.bg,border:"1px solid "+cls.color.bd,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <span style={{fontSize:14,fontWeight:600,color:cls.color.fg}}>{cls.name}</span>
                <span style={{fontSize:11,color:cls.color.fg,marginLeft:8}}>{cls.desc}</span>
              </div>
              <span style={{fontSize:18,fontWeight:700,color:cls.color.fg}}>{cls.count+"종"}</span>
            </div>
          );})}

          {/* Lifecycle */}
          <div style={{fontSize:13,fontWeight:600,color:C.t1,marginTop:12,marginBottom:8}}>Stop Code Lifecycle (Handling Sequence §5)</div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            {["Signal 감지","Stop Code 검증","5-State 전이","Stop 유지/해제","Retry / Review / Escalation"].map(function(step,i){
              var bg=i<2?"#FEF2F2":i===2?"#FFFBEB":i===3?"#EFF6FF":"#F0FDF4";
              var bd=i<2?"#FCA5A5":i===2?"#FCD34D":i===3?"#93C5FD":"#86EFAC";
              var fg=i<2?"#991B1B":i===2?"#92400E":i===3?"#1E40AF":"#166534";
              return(
              <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{padding:"6px 12px",borderRadius:C.r.sm,background:bg,border:"1px solid "+bd,fontSize:11,fontWeight:600,color:fg}}>{step}</div>
                {i<4&&<span style={{color:C.t3}}>→</span>}
              </div>
            );})}
          </div>

          {/* 운영 원칙 */}
          <div style={{padding:12,borderRadius:C.r.md,background:"#EFF6FF",border:"1px solid #93C5FD",marginTop:12}}>
            <div style={{fontSize:12,fontWeight:600,color:"#1E40AF",marginBottom:6}}>Stop Code 운영 원칙 (UI Flag §2 + §8)</div>
            <div style={{fontSize:11,color:"#1E40AF",lineHeight:1.8}}>
              <div>{"1. Stop Code ≠ 시스템 오류. 거버넌스 이벤트 기록 코드 (§2.1~2.2)"}</div>
              <div>{"2. Soft-Stop: 실행 계속 + 승인 강화 + 감사 기록 (§5.2)"}</div>
              <div>{"3. Hard-Stop: Critical Class에만 적용 — 4가지 예외 조건 (§5.3)"}</div>
              <div>{"4. UI는 공포 유발이 아닌 주의·검토·투명성 확보 목적 (§2.4)"}</div>
              <div>{"5. 모든 Stop Code는 Audit Trail에 Immutable Log로 기록 (§7)"}</div>
              <div>{"6. Override 발생 시 사유 + complianceImpactLevel 별도 기록"}</div>
            </div>
          </div>
        </div>}

      </div>
    </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
