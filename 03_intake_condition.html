const CONTROL_PROFILES={
  // Control Profile Library v1.0 + Excel Sheet③ GT_CP 정본
  low:{name:"Low",desc:"카탈로그/소액 자동",level:1},
  standard:{name:"Standard",desc:"일반 PR",level:2},

  strategicIT:{name:"Strategic IT",desc:"IT 전략+보안",level:5},

function t03Resolve(reqCard,gtCode){
  const amountNum=Number(reqCard.budget)||0; // 만원 단위 숫자

  const route=GT_ROUTE[gtCode]||"C";
  const context={
    amountNum,type:reqCard.type||"goods",urgent:reqCard.urgent||false,
    hasContract:false,contractExpiring:false,soleSource:gtCode==="G32",
    supplierRiskHigh:false,securityReview:["G26","G27","G28","G30"].includes(gtCode),
  };

  // Condition Library v1.2 §4 — 7종 조건 구조화
  const conditions={
    amount:{value:amountNum,bucket:amountNum<=100?"소액":amountNum<=5000?"중간":amountNum<=20000?"고액":"전략"},
    urgency:{value:context.urgent,level:context.urgent?"High":"Normal"},
    contract:{exists:context.hasContract,expiring:context.contractExpiring},
    supplier:{soleSource:context.soleSource,riskHigh:context.supplierRiskHigh},
    strategic:{flag:amountNum>10000||["G13","G14","G15","G33","G34"].includes(gtCode)},
    regulatory:{flag:context.securityReview,desc:context.securityReview?"IT 보안 검토 대상":"해당 없음"},
    capex:{flag:["G33"].includes(gtCode)||(amountNum>10000&&reqCard.type==="goods")},
  };

  // 정책 매칭
  const triggered=POLICY_RULES.filter(p=>p.trigger(context));

  // 승인 경로
  let approvalPath="자동 승인";
  if(amountNum>10000)approvalPath="팀장 → 부서장 → 본부장 → CFO → CEO";
  else if(amountNum>5000)approvalPath="팀장 → 부서장 → 본부장";
  else if(amountNum>500)approvalPath="팀장 → 부서장";
  else if(amountNum>100)approvalPath="팀장";

  // Control Profile 판별 — Excel Sheet③ GT_CP 정본 기준
  const GT_CP_MAP={G01:"low",G02:"low",G03:"low",G04:"low",G05:"low",G09:"low",G10:"low",G16:"low",
    G06:"standard",G07:"standard",G08:"standard",G17:"standard",G18:"standard",G19:"standard",G20:"standard",G21:"standard",G22:"standard",
    G11:"competitive",G12:"competitive",G14:"competitive",G15:"competitive",
    G26:"it",G27:"it",G29:"it",
    G13:"strategic",G23:"strategic",G24:"strategic",
    G25:"strategicPlus",G33:"strategicPlus",G34:"strategicPlus",
    G28:"strategicIT",G30:"strategicIT",
    G31:"exception",G32:"exception",G35:"exception"};
  let controlProfile=CONTROL_PROFILES[GT_CP_MAP[gtCode]]||CONTROL_PROFILES.standard;
  // 금액 오버라이드: GT가 Low이더라도 고액이면 상향
  if(controlProfile.level<3&&amountNum>5000)controlProfile=CONTROL_PROFILES.competitive;
  if(controlProfile.level<4&&amountNum>10000)controlProfile=CONTROL_PROFILES.strategic;
  if(controlProfile.level<5&&amountNum>20000)controlProfile=CONTROL_PROFILES.strategicPlus;

  // Risk Level
  const riskLevel=context.urgent||context.soleSource?"High":amountNum>5000||conditions.strategic.flag?"Medium":"Low";

  // Policy Check Summary — Policy Rule Configuration Framework v1.0 §5 Layers
  const policyCheck={
    totalRules:POLICY_RULES.length,
    triggeredCount:triggered.length,
    highSeverity:triggered.filter(p=>p.severity==="high").length,
    warnSeverity:triggered.filter(p=>p.severity==="warn").length,
    passed:triggered.filter(p=>p.severity==="high").length===0,
    layers:[...new Set(triggered.map(p=>p.layer))],
    signals:triggered.map(p=>p.signal),
  };

  return {conditions,triggered,approvalPath,controlProfile,riskLevel,amountNum,context,policyCheck,
    conditionVarsFilled:CONDITION_VARS.filter(v=>conditions[v]!==undefined).length,
    conditionVarsTotal:CONDITION_VARS.length};
}

    reqCard:{item:"레이저 프린터",type:"goods",qty:"2",qtyUnit:"대",budget:"200",spec:"HP LaserJet Pro",period:"",urgent:true,deadline:"2026-03-29",purpose:"기존 프린터 고장"},completeness:60},
  // CP: Standard (G21) — 소액 서비스
  {id:"c-small",label:"택배 포장 서비스 (₩50만)",gtCode:"G21",btCode:"BT-E",gtName:"일반 서비스 구매",route:"C",
    reqCard:{item:"전시회 화물 포장",type:"service",qty:"1",qtyUnit:"건",budget:"50",spec:"COEX 전시회 출품작 포장+운송",period:"",urgent:false,deadline:"2026-04-10",purpose:"전시회 참가"},completeness:70},
];

function App(){
  const[started,setStarted]=useState(false);
  const[msgs,setMsgs]=useState([]);
  const[busy,setBusy]=useState(false);
  const[result,setResult]=useState(null);
  const[confirmed,setConfirmed]=useState(false);
  const[state5,setState5]=useState("READY");
  const[selected,setSelected]=useState(null);
  // 임시저장 (v7.2 동기화)
  const[draftStatus,setDraftStatus]=useState(null);
  const[draftTs,setDraftTs]=useState(null);
  const ref=useRef(null);
  const draftTimerRef=useRef(null);
  useEffect(()=>{ref.current?.scrollTo({top:ref.current.scrollHeight,behavior:"smooth"});},[msgs]);

  function resetAll(){setStarted(false);setMsgs([]);setBusy(false);setResult(null);setConfirmed(false);setState5("READY");setSelected(null);setDraftStatus(null);setDraftTs(null);}

  // 자동 임시저장 — result 변경 시 3초 후 저장
  useEffect(()=>{
    if(!result)return;
    if(draftTimerRef.current)clearTimeout(draftTimerRef.current);
    draftTimerRef.current=setTimeout(()=>saveDraft(),3000);
    return ()=>{if(draftTimerRef.current)clearTimeout(draftTimerRef.current);};
  },[result,confirmed]);

  function saveDraft(){
    setDraftStatus("saving");
    setTimeout(()=>{
      setDraftStatus("saved");setDraftTs(new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}));
      setTimeout(()=>setDraftStatus(null),2000);
    },300);
  }

  const pick=(item)=>{
    const route=GT_ROUTE[item.gtCode];
    if(!VALID_ROUTES_FOR_11.includes(route)){
      alert("이 GuideType("+item.gtCode+")은 경로 "+route+"이므로 조건 점검 화면에 진입할 수 없습니다."
        +(route==="A"?"\n→ Explore에서 완결됩니다.":"")
        +(route==="B"?"\n→ 11 조건점검을 건너뛰고 12 사전검증으로 직행합니다.":""));
      return;
    }
    setSelected(item);setStarted(true);setState5("IN_PROGRESS");
    logEvent({type:"CONDITION_START",from:"READY",to:"IN_PROGRESS",trigger:"user",engine:"T03",payload:{gtCode:item.gtCode,route:item.route}});
    var catLabel=item.label||item.gtName||"";
    setMsgs([{r:"sys",c:catLabel+" 요건이 도착했어요.\n계약 조건과 정책을 점검할게요."}]);
    setTimeout(()=>runT03(item),900);
  };

  const runT03=(item)=>{
    setBusy(true);
    setMsgs(p=>[...p,{r:"thinking",c:"조건과 정책을 점검하고 있어요..."}]);
    setTimeout(()=>{
      const res=t03Resolve(item.reqCard,item.gtCode);
      setResult(res);
      const high=res.triggered.filter(p=>p.severity==="high");
      const warn=res.triggered.filter(p=>p.severity==="warn");

      let ai="조건·정책 점검이 완료되었어요.\n\n";
      ai+="💰 예상 금액: "+fmtBudget(res.amountNum)+"원\n";
      ai+="📋 승인 경로: "+res.approvalPath+"\n";
      ai+="🛡 통제 수준: "+res.controlProfile.name+" ("+res.controlProfile.desc+")\n";
      ai+="⚠ 정책 신호: "+res.triggered.length+"건";
      if(high.length>0)ai+=" (필수 조치 "+high.length+"건)";
      ai+="\n📊 조건 변수: "+res.conditionVarsFilled+"/"+res.conditionVarsTotal+"종 평가 완료";

      if(high.length>0){
        ai+="\n\n🔴 즉시 조치 필요:\n";
        high.forEach(h=>{ai+="  · "+h.rule+"\n";});
        setState5("HUMAN_REVIEW_REQUIRED");
        logEvent({type:"HUMAN_REVIEW",from:"IN_PROGRESS",to:"HUMAN_REVIEW_REQUIRED",trigger:"T03",engine:"T03+T05",payload:{highCount:high.length,signals:high.map(h=>h.signal)}});
      }
      if(warn.length>0){
        ai+="\n\n🟡 참고 사항:\n";
        warn.forEach(w=>{ai+="  · "+w.rule+"\n";});
      }
      ai+="\n\n오른쪽 패널에서 상세 내용을 확인해 주세요.";
      if(high.length===0)ai+="\n문제없으면 \"조건 확정\"을 눌러 12 사전 검증으로 이동하세요.";

      setMsgs(p=>p.filter(m=>m.r!=="thinking").concat([{r:"ai",c:ai,engine:"T03+T05"}]));
      setBusy(false);
    },1400);
  };

  const confirmCondition=()=>{
    setConfirmed(true);setState5("COMPLETED");
    logEvent({type:"CONDITION_CONFIRMED",from:state5,to:"COMPLETED",trigger:"user",engine:"T03+T05",payload:{controlProfile:result?.controlProfile?.name,riskLevel:result?.riskLevel,policyPassed:result?.policyCheck?.passed}});
    setMsgs(p=>[...p,{r:"ai",c:"✅ 조건·정책 점검 완료!\n\n다음 단계(12 사전 검증)로 이동합니다.\n실행 전 최종 검증을 수행합니다.",engine:"T03+T05",done:true}]);
  };

  const sevColor=(sev)=>sev==="high"?T.state.blocked:sev==="warn"?T.state.review:T.state.complete;

  return(<div style={{width:"100%",height:"100vh",display:"flex",flexDirection:"column",fontFamily:T.font.sans,background:T.surfAlt,color:T.text.primary}}>
    <div style={{height:48,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px",borderBottom:"1px solid "+T.border.light,background:T.surface,flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:28,height:28,borderRadius:8,background:"linear-gradient(135deg,"+T.brand+","+T.brandLt+")",display:"flex",alignItems:"center",justifyContent:"center",color:"#FFF",fontSize:11,fontWeight:700}}>BSM</div>
        <span style={{fontSize:15,fontWeight:700}}>조건·정책 점검</span>
        <Badge color={state5==="COMPLETED"?"#166534":state5==="HUMAN_REVIEW_REQUIRED"?"#92400E":"#1E40AF"} bg={state5==="COMPLETED"?"#F0FDF4":state5==="HUMAN_REVIEW_REQUIRED"?"#FFFBEB":"#EFF6FF"}>{state5==="COMPLETED"?"점검 완료":state5==="HUMAN_REVIEW_REQUIRED"?"조치 필요":"T03+T05"}</Badge>
        {selected&&<Badge color={selected.route==="D"?"#991B1B":"#5B21B6"} bg={selected.route==="D"?"#FEE2E2":"#EDE9FE"}>경로 {selected.route} · {ROUTE_DEPTH[selected.route]}차</Badge>}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {draftStatus==="saving"&&<span style={{fontSize:10,color:T.text.muted}}>💾 저장 중...</span>}
        {draftStatus==="saved"&&<span style={{fontSize:10,color:T.state.complete.fg}}>✅ 임시저장 {draftTs}</span>}
        {started&&<button onClick={resetAll} style={{padding:"4px 10px",borderRadius:T.radius.sm,border:"1px solid "+T.border.medium,background:T.surface,color:T.text.secondary,fontSize:11,fontWeight:600,cursor:"pointer"}}>↩ 처음으로</button>}
        <span style={{fontSize:12,color:T.text.muted}}>김형주 과장 (IT팀)</span>
        <div style={{width:28,height:28,borderRadius:T.radius.full,background:T.state.progress.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:600,color:T.state.progress.fg}}>김</div>
      </div>
    </div>

    <div style={{flex:1,display:"flex",overflow:"hidden"}}>
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
        {/* Breadcrumb */}
        <div style={{padding:"8px 20px",borderBottom:"1px solid "+T.border.light,background:T.surface,display:"flex",alignItems:"center",gap:6,fontSize:12}}>
          <span style={{color:"#22C55E",fontWeight:600}}>① Explore</span><span style={{color:T.text.muted}}>→</span>
          <span style={{color:"#22C55E",fontWeight:600}}>② 요건 (A02)</span><span style={{color:T.text.muted}}>→</span>
          <span style={{color:"#3B82F6",fontWeight:700}}>③ 조건 점검 (T03+T05)</span><span style={{color:T.text.muted}}>→</span>
          <span style={{color:T.text.muted}}>④ 사전 검증</span><span style={{color:T.text.muted}}>→</span>
          <span style={{color:T.text.muted}}>⑤ Execute</span>
        </div>

        <div ref={ref} style={{flex:1,overflowY:"auto",padding:20,display:"flex",flexDirection:"column",gap:12}}>
          {!started&&(
            <div style={{maxWidth:560,margin:"40px auto",textAlign:"center"}}>
              <div style={{fontSize:40,marginBottom:12}}>🔍</div>
              <div style={{fontSize:20,fontWeight:700,marginBottom:6}}>조건·정책 점검</div>
              <div style={{fontSize:14,color:T.text.secondary,marginBottom:8,lineHeight:1.7}}>
                확정된 GT 기준으로 조건을 분석하고 정책 충돌을 사전 확인합니다.
              </div>
              <div style={{fontSize:12,color:T.state.review.fg,background:T.state.review.bg,padding:"6px 12px",borderRadius:T.radius.md,marginBottom:20,display:"inline-block"}}>
                경로 C/D만 진입 가능 · 경로 A(완결)/B(건너뜀)는 차단
              </div>
              {["D","C"].map(r=>{
                const items=MOCK_FROM_10.filter(m=>m.route===r);
                if(!items.length)return null;
                return(<div key={r} style={{marginBottom:16}}>
                  <div style={{fontSize:12,fontWeight:600,color:r==="D"?"#991B1B":"#5B21B6",marginBottom:6}}>{r==="D"?"경로 D · 3차 깊이":"경로 C · 2차 깊이"}</div>
                  <div style={{display:"flex",flexDirection:"column",gap:4}}>
                    {items.map(c=>(
                      <button key={c.id} onClick={()=>pick(c)} style={{padding:"10px 14px",borderRadius:T.radius.md,border:"1px solid "+T.border.light,background:T.surface,cursor:"pointer",textAlign:"left"}}>
                        <div style={{display:"flex",justifyContent:"space-between"}}>
                          <span style={{fontSize:13,fontWeight:600}}>{c.label}</span>
                          <div style={{display:"flex",gap:4}}>
                            <Badge color={r==="D"?"#991B1B":"#5B21B6"} bg={r==="D"?"#FEE2E2":"#EDE9FE"}>{c.gtCode}</Badge>
                            <span style={{fontSize:11,color:T.text.muted}}>{fmtBudget(c.reqCard.budget)}원</span>
                          </div>
                        </div>
                        <div style={{fontSize:11,color:T.text.muted,marginTop:2}}>{c.gtName} · {c.reqCard.type==="service"?"서비스":"물품"} · {fmtQty(c.reqCard.qty,c.reqCard.qtyUnit)}</div>
                      </button>
                    ))}
                  </div>
                </div>);
              })}
            </div>
          )}

          {msgs.map((m,i)=>(
            <div key={i} style={{display:"flex",gap:10,maxWidth:"85%",alignSelf:m.r==="user"?"flex-end":"flex-start"}}>
              {m.r!=="user"&&<AiAvatar v={m.done?"done":m.r==="thinking"?"thinking":"ai"}/>}
              <div style={{padding:"10px 14px",borderRadius:T.radius.lg,background:m.r==="sys"?T.surfAlt:m.r==="thinking"?"#FFFBEB":T.surface,
                color:T.text.primary,fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap",border:"1px solid "+T.border.light,boxShadow:T.shadow.sm}}>
                {m.c}
                {m.engine&&<div style={{marginTop:6,fontSize:10,color:T.text.muted}}>Engine: {m.engine}</div>}
              </div>
            </div>
          ))}
          {busy&&<div style={{display:"flex",gap:10}}><AiAvatar v="thinking"/><div style={{padding:"10px 14px",borderRadius:T.radius.lg,background:"#FFFBEB",border:"1px solid #FCD34D",fontSize:13,color:"#92400E"}}>T03+T05 엔진이 조건과 정책을 점검하고 있어요...</div></div>}
        </div>
      </div>

      {/* Right Panel — Condition Profile */}
      {result&&(
        <div style={{width:380,background:T.surface,borderLeft:"1px solid "+T.border.light,display:"flex",flexDirection:"column",flexShrink:0}}>
          <div style={{padding:"10px 14px",borderBottom:"2px solid "+T.state.review.accent}}>
            <div style={{fontSize:14,fontWeight:700,color:T.state.review.fg}}>🔍 조건 프로파일</div>
            <div style={{fontSize:11,color:T.text.muted}}>T03 Condition + T05 Policy · {selected?.gtCode} · 경로 {selected?.route}</div>
          </div>

          <div style={{flex:1,overflowY:"auto",padding:12,display:"flex",flexDirection:"column",gap:8}}>
            {/* 요약 */}
            <div style={{padding:10,borderRadius:T.radius.md,background:T.surfAlt,border:"1px solid "+T.border.light}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                <div><div style={{fontSize:10,color:T.text.muted}}>금액</div><div style={{fontSize:14,fontWeight:700}}>{fmtBudget(result.amountNum)}원</div></div>
                <div><div style={{fontSize:10,color:T.text.muted}}>위험도</div><div style={{fontSize:14,fontWeight:700,color:result.riskLevel==="High"?T.state.blocked.fg:result.riskLevel==="Medium"?T.state.review.fg:T.state.complete.fg}}>{result.riskLevel}</div></div>
                <div><div style={{fontSize:10,color:T.text.muted}}>통제 수준</div><div style={{fontSize:13,fontWeight:700,color:T.text.primary}}>{result.controlProfile.name}</div></div>
              </div>
            </div>

            {/* 승인 경로 */}
            <div style={{padding:10,borderRadius:T.radius.md,background:T.state.progress.bg,border:"1px solid "+T.state.progress.border}}>
              <div style={{fontSize:11,fontWeight:600,color:T.state.progress.fg,marginBottom:4}}>📋 승인 경로</div>
              <div style={{fontSize:13,fontWeight:600,color:T.state.progress.fg}}>{result.approvalPath}</div>
            </div>

            {/* Condition Library v1.2 — 7종 조건 변수 */}
            <div style={{padding:10,borderRadius:T.radius.md,border:"1px solid "+T.border.light}}>
              <div style={{fontSize:11,fontWeight:600,color:T.text.secondary,marginBottom:6}}>⚙ 조건 변수 7종 (Condition Library v1.2)</div>
              {Object.entries(result.conditions).map(([k,v])=>{
                const labels={amount:"금액 수준",urgency:"긴급성",contract:"계약 존재",supplier:"공급사 조건",strategic:"전략적 구매",regulatory:"규제/보안",capex:"CAPEX 여부"};
                const val=k==="amount"?v.bucket:k==="urgency"?v.level:k==="contract"?(v.exists?"있음":"없음"):k==="supplier"?(v.soleSource?"단일 공급":"일반"):k==="strategic"?(v.flag?"해당":"비해당"):k==="regulatory"?(v.flag?v.desc:"비해당"):k==="capex"?(v.flag?"해당":"비해당"):"—";
                const active=k==="urgency"?v.value:k==="contract"?v.exists:k==="supplier"?v.soleSource:k==="strategic"?v.flag:k==="regulatory"?v.flag:k==="capex"?v.flag:false;
                return(<div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:"1px solid "+T.border.light}}>
                  <span style={{fontSize:12,color:T.text.primary}}>{labels[k]||k}</span>
                  <span style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:9999,color:active?"#92400E":"#166534",background:active?"#FFFBEB":"#F0FDF4"}}>{val}</span>
                </div>);
              })}
            </div>

            {/* 정책 신호 */}
            <div style={{padding:10,borderRadius:T.radius.md,border:"1px solid "+T.border.light}}>
              <div style={{fontSize:11,fontWeight:600,color:T.text.secondary,marginBottom:6}}>📡 정책 신호 ({result.triggered.length}건)</div>
              {result.triggered.map((p,i)=>{
                const sc=sevColor(p.severity);
                return(<div key={i} style={{padding:8,borderRadius:T.radius.sm,background:sc.bg,border:"1px solid "+sc.border,marginBottom:4}}>
                  <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,fontWeight:600,color:sc.fg}}>{p.rule}</span><span style={{fontSize:10,fontWeight:600,color:sc.fg}}>{p.severity==="high"?"필수":p.severity==="warn"?"주의":"정보"}</span></div>
                  <div style={{fontSize:11,color:sc.fg,marginTop:2,opacity:.85}}>{p.desc}</div>
                  <div style={{fontSize:10,color:T.text.muted,marginTop:2}}>Layer: {p.layer} · {p.id}</div>
                </div>);
              })}
            </div>

            {/* 시스템 */}
            <div style={{padding:8,borderRadius:T.radius.sm,background:T.surfAlt,border:"1px dashed "+T.border.light}}>
              <div style={{fontSize:10,fontWeight:600,color:T.text.muted,marginBottom:2}}>🔧 시스템 (DEV)</div>
              <div style={{fontSize:11,color:T.text.muted,lineHeight:1.5}}>
                GT: {selected?.gtCode} (확정 — 재결정 없음)<br/>
                Route: {selected?.route} · Depth: {ROUTE_DEPTH[selected?.route]}차<br/>
                Control: {result.controlProfile.name} (Level {result.controlProfile.level})<br/>
                Conditions: {result.conditionVarsFilled}/{result.conditionVarsTotal}종<br/>
                Next: 12 사전 검증 · BT: {nav?.btCode} ({BT_META[nav?.btCode]?.name||''})<br/>
                State: {state5}
              </div>
            </div>

            {!confirmed&&(
              <button onClick={confirmCondition} style={{width:"100%",padding:"12px",borderRadius:T.radius.md,border:"none",background:T.state.progress.accent,color:"#FFF",fontSize:14,fontWeight:700,cursor:"pointer",marginTop:4}}>
                조건 확정 → 12 사전 검증으로
              </button>
            )}
            {confirmed&&(
              <div style={{padding:12,borderRadius:T.radius.md,background:T.state.complete.bg,border:"1px solid "+T.state.complete.border,textAlign:"center"}}>
                <div style={{fontSize:14,fontWeight:700,color:T.state.complete.fg}}>✅ 조건 점검 완료</div>
                <div style={{fontSize:12,color:T.state.complete.fg,marginTop:4}}>12 사전 검증으로 이동합니다</div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
