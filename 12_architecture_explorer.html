            {selectedRoute && (
              <Card>
                <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Route {selectedRoute} — 해당 GT 목록</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {gtByRoute[selectedRoute].map(g => {
                    const ux = UX_GROUPS[g.ux];
                    return <Badge key={g.code} color={ux?.accent||"#64748B"} bg={ux?.bg}>{g.code} {g.kr}</Badge>;
                  })}
                </div>
              </Card>
            )}
          </div>
        )}

        {/* ─── TAB: 5-State 모델 ─── */}
        {tab === "state" && (
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <SectionTitle sub="Architecture Freeze Declaration v1.1 — Runtime State Model 확정본">5-State Runtime 모델 + 6-Screen 매핑</SectionTitle>

            {/* State Machine */}
            <Card>
              <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>5-State Transition Diagram</div>
              <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",justifyContent:"center"}}>
                {STATES.map((s,i) => (
                  <div key={s.id} style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{padding:"10px 16px",borderRadius:10,background:`${s.color}15`,border:`2px solid ${s.color}`,textAlign:"center",minWidth:100}}>
                      <div style={{fontSize:12,fontWeight:800,color:s.color}}>{s.kr}</div>
                      <div style={{fontSize:9,color:"var(--text-muted)",marginTop:2}}>{s.id}</div>
                    </div>
                    {i < STATES.length - 1 && <div style={{color:"var(--text-muted)",fontSize:16}}>→</div>}
                  </div>
                ))}
              </div>
              <div style={{marginTop:12,padding:10,borderRadius:8,background:"#EF444410",border:"1px solid #EF444430",fontSize:11}}>
                <strong>Freeze 규칙:</strong> BLOCKED → 자동 Stop Intervention 이동 (Override 불가) · HRR → 자동 Human Review 이동 (Override 불가) · COMPLETED → 반드시 Result 표시 (Override 불가)
              </div>
            </Card>

            {/* 6-Screen */}
            <Card>
              <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>6-Screen Execution Flow (Screen-API Mapping v1.1)</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {SCREENS.map(s => (
                  <div key={s.num} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:8,background:"var(--surface)"}}>
                    <div style={{width:28,height:28,borderRadius:"50%",background:"var(--accent)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>{s.num}</div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:12,fontWeight:700}}>{s.kr}</span>
                        <span style={{fontSize:10,color:"var(--text-muted)"}}>{s.name}</span>
                      </div>
                      <div style={{fontSize:10,color:"var(--text-muted)",marginTop:2,fontFamily:"monospace"}}>{s.api}</div>
                    </div>
                    <Badge>{s.state}</Badge>
                  </div>
                ))}
              </div>
            </Card>
          </div>
        )}

        {/* ─── TAB: BuyingType 11종 ─── */}
        {tab === "bt" && (
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <SectionTitle sub="BuyingType Architecture Declaration v1.0 — L3→BT 매핑은 BT Override의 기반">BuyingType 11종 레지스트리</SectionTitle>

            <div style={{padding:12,borderRadius:8,background:"#EF444410",border:"1px solid #EF444430",fontSize:12}}>
              <strong>BT Override 원칙:</strong> prAllowed=false & BT≠BT-A → UX Group 강제 'dept_request' 전환. 이것이 13번째 UX Group(주관부서 이용신청)의 존재 이유.
            </div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280,1fr))",gap:8}}>
              {BT_REGISTRY.map(b => (
                <Card key={b.code}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{fontSize:24}}>{b.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700}}>{b.code}</div>
                      <div style={{fontSize:12,color:"var(--text-muted)"}}>{b.name}</div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                      <Badge color={b.pr==="가능"?"#22C55E":b.pr==="불가"?"#EF4444":"#F59E0B"}>PR {b.pr}</Badge>
                      <Badge>{b.count}건</Badge>
                    </div>
                  </div>
                </Card>
              ))}
            </div>

            {/* PR 분포 */}
            <Card>
              <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>PR 권한 분포</div>
              <div style={{display:"flex",gap:12}}>
                {[
                  {label:"PR 불가",count:BT_REGISTRY.filter(b=>b.pr==="불가").reduce((s,b)=>s+b.count,0),color:"#EF4444",desc:"dept_request 강제 전환"},
                  {label:"PR 가능",count:BT_REGISTRY.filter(b=>b.pr==="가능").reduce((s,b)=>s+b.count,0),color:"#22C55E",desc:"GT의 원래 uxGroup 유지"},
                  {label:"조건부",count:BT_REGISTRY.filter(b=>b.pr==="조건부").reduce((s,b)=>s+b.count,0),color:"#F59E0B",desc:"기존계약 여부에 따라 분기"},
                ].map(p => (
                  <div key={p.label} style={{flex:1,padding:10,borderRadius:8,background:`${p.color}10`,border:`1px solid ${p.color}30`,textAlign:"center"}}>
                    <div style={{fontSize:22,fontWeight:800,color:p.color}}>{p.count}</div>
                    <div style={{fontSize:11,fontWeight:700,marginTop:2}}>{p.label}</div>
                    <div style={{fontSize:10,color:"var(--text-muted)",marginTop:2}}>{p.desc}</div>
                  </div>
                ))}
              </div>
            </Card>
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{borderTop:"1px solid var(--border)",padding:"12px 20px",textAlign:"center",fontSize:10,color:"var(--text-muted)"}}>
        AI-Embedded BSM Architecture Explorer v3.0 · 설계문서 109건 + UI 2건 기반 · Product Owner: 이교원 · Effective: 2026-03-28
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BSMExplorer />);
</script>
</body>
</html>
