/* ═══════════════════════════════════════════════════════════════
   A02 — Requirement Structuring Engine
   ═══════════════════════════════════════════════════════════════ */
const REQ_ITEM_KW=["노트북","서버","모니터","복합기","프린터","소프트웨어","라이선스","클라우드","사무용품","의자","책상","정수기","커피머신","에어컨"];
const REQ_SERVICE_KW=["용역","컨설팅","대행","유지보수","보안","청소","경비","시설관리","교육","디자인","개발","구축"];
const REQ_QTY_RE=/(\d+)\s*(대|개|세트|식|건|매|박스|팩|EA|ea|개월|석|명|라이선스)/;
const REQ_BUDGET_RE=/([\d,]+)\s*(만원|원|억|만)/;
const REQ_URGENCY_KW=["긴급","급하","빨리","즉시","오늘","내일","당장","ASAP"];
const REQ_PERIOD_KW=["개월","년","주","분기","연간","월간","반기"];

/* 품목 → 단위 매핑 */
const UNIT_MAP={
  "노트북":"대","서버":"대","모니터":"대","복합기":"대","프린터":"대","에어컨":"대","커피머신":"대",
  "소프트웨어":"식","라이선스":"석","클라우드":"식",
  "의자":"개","책상":"개","사무용품":"개","정수기":"대",
  "용역":"건","컨설팅":"건","대행":"건","유지보수":"건","보안":"식","청소":"건","경비":"건",
  "시설관리":"건","교육":"건","디자인":"건","개발":"건","구축":"식",
};
const UNITS_GOODS=["대","개","세트","식","건","매","박스","팩","EA","라이선스"];
const UNITS_SERVICE=["건","명","석","식","개월"];

function reqParse(raw){
  const t=raw.toLowerCase();
  let item="",type="goods";
  for(const kw of REQ_SERVICE_KW){if(t.includes(kw)){type="service";item=kw;break;}}
  if(!item)for(const kw of REQ_ITEM_KW){if(t.includes(kw)){item=kw;break;}}
  const qm=raw.match(REQ_QTY_RE);
  const qtyNum=qm?qm[1]:"";
  const qtyUnit=qm?qm[2]:(item?UNIT_MAP[item]||"":"");
  const qty=qm?qm[0]:"";
  const bm=raw.match(REQ_BUDGET_RE);
  const budget=bm?bm[0]:"";
  let budgetNum="";
  if(bm){
    const n=Number(bm[1].replace(/,/g,""));const u=bm[2];
    if(u==="원")budgetNum=String(Math.round(n/10000));
    else if(u==="억")budgetNum=String(n*10000);
    else budgetNum=String(n); // 만원, 만
  }
  let urgent=false;for(const kw of REQ_URGENCY_KW){if(t.includes(kw)){urgent=true;break;}}
  let period="";for(const kw of REQ_PERIOD_KW){if(t.includes(kw)){const pm=raw.match(new RegExp("(\\d+)\\s*"+kw));period=pm?pm[0]:kw;break;}}
  const filled=[item,qty,budget].filter(Boolean).length;
  const confidence=Math.min(0.95, 0.3 + filled*0.2 + (urgent?0.05:0) + (period?0.1:0));
  return {item:item||"(미식별)",type,qty,qtyNum,qtyUnit,budget,budgetNum,period,urgent,confidence,raw,
    missing:[].concat(!item?["품목/서비스명"]:[]).concat(!qty?["수량"]:[]).concat(!budget?["예산"]:[])};
}

function App(){
  const[started,setStarted]=useState(false);
  const[scenario,setScenario]=useState(null);
  const[msgs,setMsgs]=useState([]);
  const[input,setInput]=useState("");
  const[busy,setBusy]=useState(false);
  const[reqCard,setReqCard]=useState(null);
  const[editData,setEditData]=useState({});
  const[confirmed,setConfirmed]=useState(false);
  const[state5,setState5]=useState("READY");
  // 첨부 + 임시저장
  const[attachments,setAttachments]=useState({});
  const[draftStatus,setDraftStatus]=useState(null);
  const[draftTs,setDraftTs]=useState(null);
  const[activeDocSlot,setActiveDocSlot]=useState(null);
  const fileInputRef=useRef(null);
  const draftTimerRef=useRef(null);
  const ref=useRef(null);
  useEffect(()=>{ref.current?.scrollTo({top:ref.current.scrollHeight,behavior:"smooth"});},[msgs]);

  // 자동 임시저장
  useEffect(()=>{
    if(!reqCard||confirmed)return;
    const hasData=Object.keys(editData).some(k=>editData[k]);
    const hasFiles=Object.keys(attachments).length>0;
    if(!hasData&&!hasFiles)return;
    if(draftTimerRef.current)clearTimeout(draftTimerRef.current);
    draftTimerRef.current=setTimeout(()=>saveDraft(),3000);
    return ()=>{if(draftTimerRef.current)clearTimeout(draftTimerRef.current);};
  },[editData,attachments]);

  function saveDraft(){
    setDraftStatus("saving");
    setTimeout(()=>{
      setDraftStatus("saved");setDraftTs(new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}));
      setTimeout(()=>setDraftStatus(null),2000);
    },300);
  }

  function resetAll(){setStarted(false);setScenario(null);setMsgs([]);setInput("");setBusy(false);setReqCard(null);setEditData({});setConfirmed(false);setState5("READY");setAttachments({});setDraftStatus(null);setDraftTs(null);setActiveDocSlot(null);}

  function handleFileSelect(docId,e){
    const files=e.target.files;if(!files||!files.length)return;
    const file=files[0];
    if(file.size>20*1024*1024){alert("파일 크기는 20MB 이하만 가능합니다.");return;}
    const reader=new FileReader();
    reader.onload=(ev)=>{setAttachments(p=>({...p,[docId]:{name:file.name,size:file.size,type:file.type,data:ev.target.result}}));};
    reader.readAsDataURL(file);
    if(fileInputRef.current)fileInputRef.current.value="";
  }
  function removeFile(docId){setAttachments(p=>{const n={...p};delete n[docId];return n;});}
  function fmtSize(b){return b<1024?b+"B":b<1048576?Math.round(b/1024)+"KB":(b/1048576).toFixed(1)+"MB";}

  // 현재 GT 정보
  const nav=scenario?.nav;
  const route=nav?GT_ROUTE[nav.gtCode]||"C":"C";
  const depth=ROUTE_DEPTH[route]||2;
  const docs=nav?GT_DOCS[nav.gtCode]||[]:[];
  const nextScreen=route==="B"?"12 사전 검증":"11 조건 점검";
  const nextLabel=route==="B"?"사전 검증으로 →":"조건 점검으로 →";

  /* ── SW01 Fix: nav 컨텍스트를 파라미터로 전달하여 stale closure 제거 ──
     pickScenario에서 setScenario() 후 setTimeout 내의 runReq가
     이전 렌더의 isService/route/allFields/docs를 읽는 버그 수정.
     navCtx를 직접 전달하여 클로저 의존 제거. */
  // ── 1_explore navResult → 10 nav 어댑터 ──
  // 1_explore: category={l3,name,cluster}, gtInfo={label,...}, no type/gtName/route
  // 10_req: category="서버 장비" 문자열, type="goods"/"service", gtName="전략 품목 경쟁", route="D"
  function adaptNav(navObj){
    if(!navObj)return navObj;
    var n=Object.assign({},navObj);
    // category 객체→문자열
    if(n.category&&typeof n.category==="object"){
      n.categoryObj=n.category; // 원본 보존
      n.category=n.category.name||"";
    }
    // gtName 없으면 gtInfo에서
    if(!n.gtName&&n.gtInfo)n.gtName=n.gtInfo.label||n.gtInfo.name||"";
    // type 없으면 cluster에서 추론
    if(!n.type){
      var svcClusters=["service","professional","project_service","maintenance","facility","insurance","contact"];
      n.type=(n.categoryObj&&svcClusters.indexOf(n.categoryObj.cluster)>=0)?"service":"goods";
    }
    // route 없으면 GT_ROUTE에서
    if(!n.route)n.route=GT_ROUTE[n.gtCode]||"C";
    return n;
  }

  function getNavContext(navObj) {
    navObj=adaptNav(navObj);
    const r = navObj ? GT_ROUTE[navObj.gtCode] || "C" : "C";
    const d = ROUTE_DEPTH[r] || 2;
    const isSvc = navObj?.type === "service";
    const docList = navObj ? GT_DOCS[navObj.gtCode] || [] : [];
    const FIELDS_B_GT_MAP = {G18:FIELDS_B_G18,G19:FIELDS_B_G19,G20:FIELDS_B_G20};
    const fields = r === "B" ? (FIELDS_B_GT_MAP[navObj?.gtCode] || FIELDS_B_FALLBACK)
      : r === "D" ? (isSvc ? FIELDS_D_SERVICE : FIELDS_D_GOODS)
      : (isSvc ? FIELDS_C_SERVICE : FIELDS_C_GOODS);
    return { route: r, depth: d, isService: isSvc, docs: docList, allFields: fields };
  }

  const pickScenario=(sc)=>{
    sc.nav=adaptNav(sc.nav);
    const l3key=sc.nav?sc.nav.category:null;
    const r=GT_ROUTE[sc.nav.gtCode];
    if(r==="A"){alert("이 GuideType("+sc.nav.gtCode+")은 Explore에서 완결됩니다.");return;}
    setScenario(sc);setStarted(true);setState5("IN_PROGRESS");
    logEvent({type:"INTAKE_START",from:"READY",to:"IN_PROGRESS",trigger:"user",engine:"A02",payload:{gtCode:sc.nav.gtCode,route:r}});

    setMsgs([{r:"sys",c:catLabel+" 건이 넘어왔어요.\n"+depthMsg+" 몇 가지 질문 드릴게요."}]);
    const navCtx = getNavContext(sc.nav);
    setTimeout(()=>runReq(sc.raw, sc.nav, navCtx),800);
  };

  const runReq=(raw, navObj, navCtx)=>{
    // SW01: navCtx가 없으면 현재 렌더 값으로 fallback (채팅 입력 send()에서 호출 시)
    const ctx = navCtx || getNavContext(adaptNav(navObj || nav));
    setBusy(true);
    setMsgs(p=>[...p,{r:"thinking",c:"요청 내용을 분석하고 있어요..."}]);
    setTimeout(()=>{
      const parsed=reqParse(raw);
      setReqCard(parsed);
      setEditData({item:parsed.item==="(미식별)"?"":parsed.item,qty:parsed.qtyNum,qtyUnit:parsed.qtyUnit,budget:parsed.budgetNum,period:parsed.period,scope:"",spec:"",deadline:"",purpose:"",change:"",detail:"",note:"",evalCriteria:"",preferredSupplier:"",actionType:""});
      const conf=Math.round(parsed.confidence*100);
      let ai="요청 내용을 분석했어요.\n\n";
      // SW01: 클로저 대신 ctx에서 직접 참조
      if(ctx.isService){
        ai+="🤝 서비스: "+parsed.item+"\n";
        if(parsed.budgetNum)ai+="💰 예산: "+Number(parsed.budgetNum).toLocaleString()+" 만원\n";
        if(parsed.period)ai+="📅 기간: "+parsed.period+"\n";
      }else{
        ai+="📦 품목: "+parsed.item+"\n";
        if(parsed.qty)ai+="🔢 수량: "+parsed.qty+"\n";
        if(parsed.budgetNum&&ctx.route!=="B")ai+="💰 예산: "+Number(parsed.budgetNum).toLocaleString()+" 만원\n";
      }
      if(ctx.depth===3)ai+="\n📊 3차 워크스페이스 모드 — 사양 구조화 + 과거 이력을 함께 분석합니다.";
      // SW01: ctx.allFields 사용
      const reqFields=ctx.allFields.filter(f=>f.required);
      const ed={item:parsed.item==="(미식별)"?"":parsed.item,qty:parsed.qtyNum,budget:parsed.budgetNum,period:parsed.period};
      const missingLabels=reqFields.filter(f=>!ed[f.k]).map(f=>f.l);
      if(missingLabels.length>0)ai+="\n\n아직 "+missingLabels.join(", ")+" 정보가 부족해요.\n오른쪽 패널에서 직접 입력하시거나, 채팅으로 알려주셔도 돼요.";
      else ai+="\n\n모든 핵심 정보가 추출되었어요. 오른쪽에서 확인해 주세요.";
      if(ctx.docs.length>0){
        const reqDocs=ctx.docs.filter(d=>d.required);
        if(reqDocs.length>0)ai+="\n\n📎 "+reqDocs.map(d=>d.label).join(", ")+" 제출이 필요해요. 오른쪽 패널에서 등록해 주세요.";
        else ai+="\n\n📎 참고자료가 있으면 오른쪽 패널에서 첨부해 주세요. (선택)";
      }
      setMsgs(p=>p.filter(m=>m.r!=="thinking").concat([{r:"ai",c:ai,engine:"T03+T06"}]));
      setBusy(false);
    },1200);
  };

  const send=()=>{
    if(!input.trim()||busy)return;
    const txt=input.trim();setInput("");
    setMsgs(p=>[...p,{r:"user",c:txt}]);
    if(!reqCard){runReq(txt, nav, null);}
    else{
      setBusy(true);
      // SW01: 현재 nav 기준으로 ctx 계산
      const ctx = getNavContext(nav);
      setTimeout(()=>{
        const update={...editData};
        const qm=txt.match(REQ_QTY_RE);if(qm){update.qty=qm[1];update.qtyUnit=qm[2];}
        const bm=txt.match(REQ_BUDGET_RE);if(bm){const bn=Number(bm[1].replace(/,/g,""));const bu=bm[2];if(bu==="원")update.budget=String(Math.round(bn/10000));else if(bu==="억")update.budget=String(bn*10000);else update.budget=String(bn);}
        for(const kw of REQ_ITEM_KW){if(txt.includes(kw)){update.item=kw;break;}}
        for(const kw of REQ_SERVICE_KW){if(txt.includes(kw)){update.item=kw;break;}}
        setEditData(update);
        const reqF=ctx.allFields.filter(f=>f.required);
        const still=reqF.filter(f=>!update[f.k]).map(f=>f.l);
        let reply="정보가 업데이트되었어요. (A02 재분석)\n\n";
        reply+=still.length>0?"아직 "+still.join(", ")+"이 필요해요.":"핵심 정보가 모두 채워졌어요! 확인 후 \"요건 확정\"을 눌러주세요.";
        setMsgs(p=>[...p,{r:"ai",c:reply,engine:"T03+T06"}]);
        setBusy(false);
      },600);
    }
  };

  const confirmReq=()=>{
    // 필수 첨부 검증

      if(missing.length>0){alert("필수 첨부문서를 등록해 주세요:\n"+missing.map(d=>"• "+d.label).join("\n"));return;}
    }
    setConfirmed(true);setState5("COMPLETED");
    logEvent({type:"REQ_CONFIRMED",from:"IN_PROGRESS",to:"COMPLETED",trigger:"user",engine:"A02",payload:{gtCode:scenario.nav.gtCode,route,attachCount:Object.keys(attachments).length}});
    const fileNames=Object.keys(attachments).map(k=>attachments[k].name);
    let msg="✅ 요건 카드가 확정되었어요!";
    if(fileNames.length>0)msg+="\n📎 첨부파일 "+fileNames.length+"건 포함";
    msg+="\n\n다음 단계("+nextScreen+")로 이동합니다.";
    if(route==="B")msg+="\n계약 기반 발주이므로 조건 점검을 건너뛰고 사전 검증으로 바로 갑니다.";
    setMsgs(p=>[...p,{r:"ai",c:msg,engine:"T03+T06",done:true}]);
  };

  /* ── 경로 × 유형별 폼 필드 ──

    const d=editData;const f=allFields.filter(x=>x.required);

  const comp=completeness();

  return(<div style={{width:"100%",height:"100vh",display:"flex",flexDirection:"column",fontFamily:T.font.sans,background:T.surfAlt,color:T.text.primary}}>

      <div style={{display:"flex",alignItems:"center",gap:10}}>

        <span style={{fontSize:15,fontWeight:700}}>요건 구조화</span>
        <Badge color={state5==="COMPLETED"?"#166534":"#1E40AF"} bg={state5==="COMPLETED"?"#F0FDF4":"#EFF6FF"}>{state5==="COMPLETED"?"확정 완료":"A02 · T03+T06"}</Badge>

        {/* 임시저장 상태 */}

        <span style={{fontSize:12,color:T.text.muted}}>김형주 과장 (IT팀)</span>
        <div style={{width:28,height:28,borderRadius:T.radius.full,background:T.state.progress.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:600,color:T.state.progress.fg}}>김</div>

    <div style={{flex:1,display:"flex",overflow:"hidden"}}>
      {/* Chat */}
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
        {/* Breadcrumb — 경로별 동적 */}

          <span style={{color:T.text.muted}}>→</span>
          {route==="B"?(
            <><span style={{color:T.text.muted,textDecoration:"line-through"}}>③ 조건 점검 (건너뜀)</span><span style={{color:T.text.muted}}>→</span><span style={{color:T.text.muted}}>④ 사전 검증</span></>
          ):(
            <><span style={{color:T.text.muted}}>③ 조건 점검</span><span style={{color:T.text.muted}}>→</span><span style={{color:T.text.muted}}>④ 사전 검증</span></>

          <span style={{color:T.text.muted}}>→</span>

            </div>
            <div style={{width:36,height:36,borderRadius:"50%",background:comp===100?"conic-gradient("+T.state.complete.accent+" "+comp+"%, "+T.border.light+" 0)":"conic-gradient("+T.state.progress.accent+" "+comp+"%, "+T.border.light+" 0)",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{width:28,height:28,borderRadius:"50%",background:T.surface,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:comp===100?T.state.complete.fg:T.state.progress.fg}}>{comp}%</div>
            </div>
          </div>

          <div style={{flex:1,overflowY:"auto",padding:12,display:"flex",flexDirection:"column",gap:8}}>
            {/* 3차: A03 과거 이력 영역 */}
            {depth===3&&(
              <div style={{padding:10,borderRadius:T.radius.md,background:"#FDF4FF",border:"1px solid #E879F9"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#86198F",marginBottom:4}}>📚 A03 과거 이력 참조</div>
                <div style={{fontSize:12,color:"#86198F",lineHeight:1.6}}>유사 구매 건: 3건 (최근 12개월)<br/>평균 단가: {nav?.category==="서버 장비"?"대당 2,100만원":"건당 8,500만원"}<br/>주요 공급사: {nav?.category==="서버 장비"?"Dell, HP, 레노버":"딜로이트, PwC, BCG"}<br/>평균 소요일: {nav?.category==="서버 장비"?"14일":"45일"}</div>
              </div>
            )}

            {/* Confidence */}
            <div style={{padding:"8px 10px",borderRadius:T.radius.md,background:reqCard.confidence>=0.7?T.state.complete.bg:T.state.review.bg,border:"1px solid "+(reqCard.confidence>=0.7?T.state.complete.border:T.state.review.border)}}>
              <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,fontWeight:600,color:reqCard.confidence>=0.7?T.state.complete.fg:T.state.review.fg}}>A02 구조화 신뢰도</span><span style={{fontSize:13,fontWeight:700,color:reqCard.confidence>=0.7?T.state.complete.fg:T.state.review.fg}}>{Math.round(reqCard.confidence*100)}%</span></div>
            </div>

            {/* 계약 정보 (경로 B) */}
            {route==="B"&&nav?.contract&&(
              <div style={{padding:10,borderRadius:T.radius.md,background:"#EFF6FF",border:"2px solid #93C5FD"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#1E3A8A",marginBottom:4}}>📄 기존 계약 (11 조건점검 건너뜀)</div>
                <div style={{fontSize:12,color:"#1E3A8A"}}>업체: {nav.contract.vendor}<br/>계약: {nav.contract.contract}<br/>담당: {nav.contract.manager}<br/>💰 계약 단가 적용 — 요청 부서 예산 관리 대상 아님</div>
              </div>
            )}

            {/* 폼 필드 */}
            {allFields.map(f=>{
              const fieldLabel=f.dynamicLabel&&editData.actionType?f.dynamicLabel[editData.actionType]||f.l:f.l;
              return(
              <div key={f.k} style={{padding:"8px 10px",borderRadius:T.radius.md,border:"1px solid "+(f.required&&!editData[f.k]?T.state.review.border:T.border.light),background:confirmed?T.surfAlt:T.surface}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:11,fontWeight:600,color:T.text.secondary}}>{f.icon} {fieldLabel}{f.required&&<span style={{color:T.state.blocked.accent}}> *</span>}</span>
                  {editData[f.k]&&<span style={{fontSize:9,color:T.state.complete.fg,fontWeight:600}}>✓</span>}
                </div>
                {confirmed?<div style={{fontSize:13,color:T.text.primary,fontWeight:500}}>{f.qtyCombo?((editData[f.k]||"—")+(editData.qtyUnit?" "+editData.qtyUnit:"")):f.budgetCombo?(editData[f.k]?Number(editData[f.k]).toLocaleString()+" 만원":"—"):f.toggle?(editData[f.k]?"예":"아니오"):f.select?f.labels[f.select.indexOf(editData[f.k])]:f.date&&editData[f.k]?new Date(editData[f.k]).toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric"}):(editData[f.k]||"—")}</div>
                :f.qtyCombo?<div style={{display:"flex",gap:6}}>
                  <input type="number" min="1" value={editData[f.k]||""} onChange={e=>setEditData(p=>({...p,[f.k]:e.target.value}))} placeholder="숫자" style={{flex:1,padding:"5px 8px",borderRadius:6,border:"1px solid "+T.border.light,fontSize:12,outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/>
                  <select value={editData.qtyUnit||""} onChange={e=>setEditData(p=>({...p,qtyUnit:e.target.value}))} style={{width:72,padding:"5px 4px",borderRadius:6,border:"1px solid "+T.border.light,fontSize:12,outline:"none",fontFamily:"inherit",background:T.surface,color:editData.qtyUnit?T.text.primary:T.text.muted,cursor:"pointer"}}>
                    <option value="">단위</option>
                    {(isService?UNITS_SERVICE:UNITS_GOODS).map(u=><option key={u} value={u}>{u}</option>)}
                  </select>
                </div>
                :f.budgetCombo?<div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <input type="number" min="0" value={editData[f.k]||""} onChange={e=>setEditData(p=>({...p,[f.k]:e.target.value}))} placeholder="금액" style={{flex:1,padding:"5px 8px",borderRadius:6,border:"1px solid "+T.border.light,fontSize:12,outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/>
                  <span style={{fontSize:12,fontWeight:600,color:T.text.secondary,flexShrink:0}}>만원</span>
                </div>
                :f.toggle?<div style={{display:"flex",gap:6}}>{["예","아니오"].map((opt,oi)=><button key={opt} onClick={()=>setEditData(p=>({...p,[f.k]:oi===0}))} style={{flex:1,padding:"5px",borderRadius:6,border:"1px solid "+(editData[f.k]===(oi===0)?T.state.progress.accent:T.border.light),background:editData[f.k]===(oi===0)?T.state.progress.bg:T.surface,color:editData[f.k]===(oi===0)?T.state.progress.fg:T.text.muted,fontSize:12,fontWeight:500,cursor:"pointer"}}>{opt}</button>)}</div>
                :f.select?<div style={{display:"flex",gap:6}}>{f.select.map((opt,oi)=><button key={opt} onClick={()=>setEditData(p=>({...p,[f.k]:opt}))} style={{flex:1,padding:"5px",borderRadius:6,border:"1px solid "+(editData[f.k]===opt?T.state.progress.accent:T.border.light),background:editData[f.k]===opt?T.state.progress.bg:T.surface,color:editData[f.k]===opt?T.state.progress.fg:T.text.muted,fontSize:12,fontWeight:500,cursor:"pointer"}}>{f.labels[oi]}</button>)}</div>
                :f.date?<input type="date" value={editData[f.k]||""} min={new Date().toISOString().split("T")[0]} onChange={e=>setEditData(p=>({...p,[f.k]:e.target.value}))} style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid "+T.border.light,fontSize:12,outline:"none",fontFamily:"inherit",boxSizing:"border-box",color:editData[f.k]?T.text.primary:T.text.muted}}/>
                :f.long?<textarea value={editData[f.k]||""} onChange={e=>setEditData(p=>({...p,[f.k]:e.target.value}))} rows={route==="D"?3:2} placeholder={fieldLabel+" 입력..."} style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid "+T.border.light,fontSize:12,outline:"none",fontFamily:"inherit",resize:"vertical",boxSizing:"border-box"}}/>
                :<input value={editData[f.k]||""} onChange={e=>setEditData(p=>({...p,[f.k]:e.target.value}))} placeholder="입력..." style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid "+T.border.light,fontSize:12,outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/>}
              </div>
            );})}

            {/* 첨부문서 */}
            {docs.length>0&&!confirmed&&(
              <div style={{padding:10,borderRadius:T.radius.md,border:"1px solid "+T.border.medium,background:"#FAFBFC"}}>
                <div style={{fontSize:11,fontWeight:700,color:T.text.primary,marginBottom:2}}>📎 첨부문서</div>
                <div style={{fontSize:10,color:T.text.muted,marginBottom:8}}>
                  {docs.some(d=>d.required)?"필수 문서를 등록하고, 참고자료가 있으면 함께 첨부해 주세요.":"참고자료가 있으면 첨부해 주세요. 없어도 진행 가능합니다."}
                </div>
                <input ref={fileInputRef} type="file" style={{display:"none"}} accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.hwp,.zip,.jpg,.png" onChange={e=>{if(activeDocSlot)handleFileSelect(activeDocSlot,e);}}/>
                {docs.map(doc=>{
                  const file=attachments[doc.id];
                  return(<div key={doc.id} style={{marginBottom:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
                      <span style={{fontSize:11,fontWeight:600,color:doc.required?T.text.primary:T.text.secondary}}>{doc.label}</span>
                      {doc.required?<span style={{fontSize:9,fontWeight:700,color:"#DC2626",padding:"1px 4px",borderRadius:3,background:"#FEF2F2"}}>필수</span>
                        :<span style={{fontSize:9,color:T.text.muted,padding:"1px 4px",borderRadius:3,background:T.surfAlt}}>선택</span>}
                    </div>
                    {doc.desc&&!file&&<div style={{fontSize:10,color:T.text.muted,marginBottom:3}}>{doc.desc}</div>}
                    {!file?<div onClick={()=>{setActiveDocSlot(doc.id);setTimeout(()=>fileInputRef.current?.click(),50);}}
                      onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="#3B82F6";}}
                      onDragLeave={e=>e.currentTarget.style.borderColor=T.border.medium}
                      onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor=T.border.medium;if(e.dataTransfer.files.length)handleFileSelect(doc.id,{target:{files:e.dataTransfer.files}});}}
                      style={{padding:"8px",borderRadius:T.radius.sm,border:"1.5px dashed "+(doc.required?T.state.review.border:T.border.medium),background:T.surface,textAlign:"center",cursor:"pointer"}}>
                      <div style={{fontSize:11,color:doc.required?T.state.review.fg:T.text.muted}}>{doc.required?"클릭하여 등록 (필수)":"클릭하여 첨부 (선택)"}</div>
                    </div>
                    :<div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 8px",borderRadius:T.radius.sm,background:T.state.complete.bg,border:"1px solid "+T.state.complete.border}}>
                      <span style={{fontSize:14}}>✅</span>
                      <div style={{flex:1,minWidth:0}}><div style={{fontSize:11,fontWeight:600,color:T.state.complete.fg,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{file.name}</div><div style={{fontSize:10,color:T.text.muted}}>{fmtSize(file.size)}</div></div>
                      <button onClick={()=>removeFile(doc.id)} style={{width:20,height:20,borderRadius:10,border:"none",background:"rgba(0,0,0,.08)",color:T.text.muted,fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                    </div>}
                  </div>);
                })}
              </div>
            )}

            {/* 시스템 정보 (개발용) */}
            {scenario&&<div style={{padding:8,borderRadius:T.radius.sm,background:T.surfAlt,border:"1px dashed "+T.border.light}}>
              <div style={{fontSize:10,fontWeight:600,color:T.text.muted,marginBottom:2}}>🔧 시스템 (DEV)</div>
              <div style={{fontSize:11,color:T.text.muted,lineHeight:1.5}}>
                From: Explore → {nav?.btCode||"?"}/{nav?.gtCode} · 경로 {route} · 깊이 {depth}차<br/>
                Category: {nav?.category} · Conf: {nav?.confidence}<br/>
                Next: {nextScreen}{route==="B"?" (11 건너뜀)":""}<br/>
                BT: {nav?.btCode} ({BT_META[nav?.btCode]?.name||''})<br/>
                State: {state5} · Docs: {docs.length}개 (필수 {docs.filter(d=>d.required).length})
              </div>
            </div>}

            {/* 버튼 */}
            {!confirmed&&(
              <div style={{display:"flex",gap:6,marginTop:4}}>
                <button onClick={saveDraft} style={{flex:1,padding:"10px",borderRadius:T.radius.md,border:"1px solid "+T.border.medium,background:T.surface,color:T.text.secondary,fontSize:13,fontWeight:500,cursor:"pointer"}}>💾 임시저장</button>
                <button onClick={confirmReq} disabled={comp<60} style={{flex:2,padding:"10px",borderRadius:T.radius.md,border:"none",background:comp>=60?T.state.progress.accent:T.border.light,color:comp>=60?"#FFF":T.text.muted,fontSize:14,fontWeight:700,cursor:comp>=60?"pointer":"default"}}>
                  {comp>=60?("요건 확정 → "+nextLabel):("정보를 더 채워주세요 ("+comp+"%)")}
                </button>
              </div>
            )}

            {confirmed&&<div style={{padding:12,borderRadius:T.radius.md,background:T.state.complete.bg,border:"1px solid "+T.state.complete.border,textAlign:"center"}}>
              <div style={{fontSize:14,fontWeight:700,color:T.state.complete.fg}}>✅ 요건 확정 완료</div>
              <div style={{fontSize:12,color:T.state.complete.fg,marginTop:4}}>{nextScreen}으로 이동합니다{route==="B"?" (11 건너뜀)":""}</div>
            </div>}

            {/* BT 위반코드 경고 */}
            {nav&&nav.btCode&&BT_META[nav.btCode]&&(
              <div style={{padding:8,borderRadius:T.radius.sm,background:"#FEF2F2",border:"1px solid #FCA5A5"}}>
                <div style={{fontSize:10,fontWeight:600,color:"#991B1B",marginBottom:3}}>⛔ {BT_META[nav.btCode].icon} {BT_META[nav.btCode].name} 위반 시 차단</div>
                {BT_META[nav.btCode].violCodes.map((v,vi)=><div key={vi} style={{fontSize:10,color:"#7F1D1D",lineHeight:1.5}}>• {v}</div>)}
              </div>
            )}

            <div style={{padding:"8px 10px",borderRadius:T.radius.md,border:"1px solid "+T.border.light,background:T.surfAlt}}>
              <div style={{fontSize:13,fontWeight:600,color:T.text.primary}}>{BUYER.name}</div>
              <div style={{fontSize:11,color:T.text.secondary}}>{BUYER.dept} · 내선 {BUYER.ext}</div>
            </div>
          </div>
        </div>
      )}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
