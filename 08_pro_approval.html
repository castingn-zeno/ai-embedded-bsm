              <div>{"예산 초과: 자동 HOLD → 추가 승인 1단계 추가 — T13 Cost Control §6.2"}</div>
              <div>{"수의계약: 사유서 필수 + 부서장 이상 승인 — T13+T14"}</div>
              <div>{"ESG 위반 공급사: 본부장 이상 승인 강제 — T14 Ethical Compliance"}</div>
            </div>
          </div>
        </div>}

        {/* ═══ 대기 중 §3.3 + 5-State ═══ */}
        {tab==="pending"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:600,color:C.t1}}>{"승인 대기 ("+PENDING.length+"건)"}</div>
            <div style={{display:"flex",gap:6}}>
              <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:9999,color:"#991B1B",background:"#FEF2F2"}}>{"긴급 "+PENDING.filter(function(p){return p.urgency==="emergency";}).length+"건"}</span>
              <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:9999,color:"#92400E",background:"#FFFBEB"}}>{"지연 위험 "+PENDING.filter(function(p){return parseFloat(p.waited)>2;}).length+"건"}</span>
            </div>
          </div>

          {PENDING.map(function(p,i){
            var isUrg=p.urgency==="emergency";
            var isDelay=parseFloat(p.waited)>2;
            var st=STATE_MAP[p.state5]||STATE_MAP.READY;
            return(
              <div key={i} style={{padding:12,borderRadius:C.r.md,background:isUrg?"#FEF2F2":isDelay?"#FFFBEB":"#F8FAFC",border:isUrg?"2px solid #EF4444":"1px solid "+C.bl,marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {isUrg&&<span style={{fontSize:14}}>🚨</span>}
                    <span style={{fontSize:14,fontWeight:600,color:C.t1}}>{p.title}</span>
                    <span style={{fontSize:10,color:C.t3}}>{p.id}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:9999,color:st.fg,background:st.bg}}>{st.label}</span>
                    <span style={{fontSize:16,fontWeight:700,color:C.brand}}>{p.amount}</span>
                  </div>
                </div>
                <div style={{display:"flex",gap:12,fontSize:11,color:C.t2,marginBottom:6}}>
                  <span>{p.requester}</span>
                  <span>{p.rule}</span>
                  <span style={{color:C.t3}}>{"엔진: "+p.engine}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:11,color:C.t3}}>현재:</span>
                    <span style={{fontSize:12,fontWeight:600,padding:"3px 10px",borderRadius:9999,color:isUrg?"#991B1B":isDelay?"#92400E":"#1E40AF",background:isUrg?"#FEF2F2":isDelay?"#FFFBEB":"#EFF6FF"}}>{p.currentLevel+" 승인 대기"}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:11,color:isDelay?"#991B1B":"#94A3B8"}}>{"대기 "+p.waited}</span>
                    <button style={{padding:"5px 12px",borderRadius:C.r.md,border:"none",background:C.brand,color:"#FFF",fontSize:11,fontWeight:600}}>독촉</button>
                  </div>
                </div>
              </div>
            );
          })}

          <div style={{padding:12,borderRadius:C.r.md,background:"#FFFBEB",border:"1px solid #FCD34D",marginTop:8}}>
            <div style={{fontSize:12,fontWeight:600,color:"#92400E",marginBottom:4}}>승인 지연 리스크 (§3.3.5)</div>
            <div style={{fontSize:11,color:"#92400E",lineHeight:1.6}}>
              <div>{"PR-2025-1095 (ERP 컨설팅 ₩2.5억): CFO 단계 3.2일 — SLA 기준(3일) 초과"}</div>
              <div>{"PR-2025-1092 (마케팅 대행 ₩8,500만): 본부장 단계 2.1일 — 내일 SLA 초과 예정"}</div>
            </div>
          </div>
        </div>}

        {/* ═══ NEW: 계약 실행 통제 §3.2 ═══ */}
        {tab==="contract"&&<div>
          <div style={{fontSize:13,fontWeight:600,color:C.t1,marginBottom:12}}>계약 실행 통제</div>

          {CONTRACT_GOV.map(function(c,i){
            var cs=CON_STATUS_STYLE[c.status]||C.info;
            return(
            <div key={i} style={{padding:14,borderRadius:C.r.md,background:C.bg,border:"1px solid "+cs.bd,marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:9999,color:cs.fg,background:cs.bg}}>{c.type}</span>
                  <span style={{fontSize:14,fontWeight:600,color:C.t1}}>{c.title}</span>
                </div>
                <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:9999,color:cs.fg,background:cs.bg}}>{c.status}</span>
              </div>
              <div style={{display:"flex",gap:16,fontSize:11,color:C.t3,marginBottom:6}}>
                <span>{c.contract}</span>
                <span>{c.amount}</span>
                <span>{"만료: "+c.exp}</span>
                <span>{"엔진: "+c.engine}</span>
              </div>
              <div style={{fontSize:12,color:C.t2,lineHeight:1.6}}>{c.detail}</div>
            </div>
          );})}

          <div style={{padding:10,borderRadius:C.r.sm,background:"#F0F4FF",border:"1px solid #BFDBFE",fontSize:11,color:"#1E40AF",lineHeight:1.6,marginTop:8}}>
            <span>{"T11 Legal Clause Tracker + T12 Clause Assembly Checker가 계약 조항을 자동 분석합니다. T14 Ethical Compliance Validator가 윤리·ESG 리스크를 검증합니다."}</span>
          </div>
        </div>}

        {/* ═══ NEW: 진행 통제 이벤트 §3.4 ═══ */}
        {tab==="events"&&<div>
          <div style={{fontSize:13,fontWeight:600,color:C.t1,marginBottom:12}}>진행 통제 이벤트</div>

          {PROCESS_EVENTS.map(function(e,i){
            var es=EVT_STYLE[e.type]||C.info;
            var st=STATE_MAP[e.state5]||STATE_MAP.READY;
            return(
            <div key={i} style={{padding:14,borderRadius:C.r.md,background:C.bg,border:"2px solid "+es.bd,marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:9999,color:es.fg,background:es.bg}}>{e.type}</span>
                  <span style={{fontSize:14,fontWeight:600,color:C.t1}}>{e.title}</span>
                </div>
                <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:9999,color:st.fg,background:st.bg}}>{st.label}</span>
              </div>
              <div style={{fontSize:11,color:C.t3,marginBottom:4}}>{"트리거: "+e.trigger}</div>
              <div style={{fontSize:12,color:C.t2,lineHeight:1.6,marginBottom:6}}>{e.detail}</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:10,color:C.t3}}>{e.time}</span>
                <span style={{padding:"4px 10px",borderRadius:C.r.sm,background:es.bg,border:"1px solid "+es.bd,fontSize:11,fontWeight:500,color:es.fg}}>{"→ "+e.action}</span>
              </div>
            </div>
          );})}

          <div style={{padding:10,borderRadius:C.r.sm,background:"#F0F4FF",border:"1px solid #BFDBFE",fontSize:11,color:"#1E40AF",lineHeight:1.6,marginTop:8}}>
            <span>{"§3.4: BLOCKED = 즉시 차단 (Governance 승인 필요), HOLD = 자동 보류, RE_EVAL = 재검토 요청, AUDIT = 감사 기록 자동 생성, STATE_CONFIRM = 상태 확정 대기. 5-State 모델과 연계됩니다."}</span>
          </div>
        </div>}

        {/* ═══ 승인자 ═══ */}
        {tab==="approvers"&&<div>
          <div style={{fontSize:13,fontWeight:600,color:C.t1,marginBottom:12}}>승인자 현황</div>

          {APPROVERS.map(function(a,i){return(
            <div key={i} style={{padding:12,borderRadius:C.r.md,background:C.bg,border:"1px solid "+C.bl,marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:32,height:32,borderRadius:16,background:C.brand,color:"#FFF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700}}>{a.name.charAt(0)}</div>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:C.t1}}>{a.name}</div>
                    <div style={{fontSize:11,color:C.t3}}>{a.dept+" · "+a.level}</div>
                  </div>
                </div>
                {a.pending>0&&<span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:9999,color:"#92400E",background:"#FFFBEB"}}>{"대기 "+a.pending+"건"}</span>}
              </div>
              <div style={{display:"flex",gap:16,fontSize:11}}>
                <span style={{color:C.t3}}>{"평균 처리: "}</span><span style={{color:C.t1,fontWeight:600}}>{a.avgDays+"일"}</span>
                <span style={{color:C.t3}}>{"승인율: "}</span><span style={{color:parseFloat(a.rate)>=95?"#166534":"#92400E",fontWeight:600}}>{a.rate}</span>
              </div>
            </div>
          );})}

          <div style={{padding:12,borderRadius:C.r.md,background:"#FFFBEB",border:"1px solid #FCD34D",marginTop:8}}>
            <div style={{fontSize:12,fontWeight:600,color:"#92400E",marginBottom:4}}>승인 지연 리스크</div>
            <div style={{fontSize:11,color:"#92400E",lineHeight:1.6}}>
              <div>{"PR-2025-1095: CFO 3.2일 대기 — SLA(3일) 초과"}</div>
              <div>{"PR-2025-1092: 본부장 2.1일 — 내일 SLA 초과 예정"}</div>
            </div>
          </div>
        </div>}

        {/* ═══ 이력 ═══ */}
        {tab==="history"&&<div>
          <div style={{fontSize:13,fontWeight:600,color:C.t1,marginBottom:12}}>최근 승인 이력</div>

          {HISTORY.map(function(h,i){
            var approved=h.result==="승인";
            var st=STATE_MAP[h.state5]||STATE_MAP.READY;
            return(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:C.r.md,background:C.bg,border:"1px solid "+C.bl,marginBottom:6}}>
                <div style={{width:24,height:24,borderRadius:12,background:approved?"#22C55E":"#EF4444",color:"#FFF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>{approved?"✓":"✗"}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:500,color:C.t1}}>{h.title}</div>
                  <div style={{fontSize:11,color:C.t3}}>{h.id+" · "+h.rule}</div>
                </div>
                <span style={{fontSize:13,fontWeight:600,color:C.brand}}>{h.amount}</span>
                <span style={{fontSize:11,color:C.t3}}>{h.approver}</span>
                <span style={{fontSize:11,color:C.t3}}>{h.days+"일"}</span>
                <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:9999,color:st.fg,background:st.bg}}>{st.label}</span>
                <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:9999,color:approved?"#166534":"#991B1B",background:approved?"#F0FDF4":"#FEF2F2"}}>{h.result}</span>
              </div>
            );
          })}

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginTop:12}}>
            <div style={{padding:12,borderRadius:C.r.md,background:"#F0FDF4",border:"1px solid #86EFAC",textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:700,color:"#166534"}}>96%</div>
              <div style={{fontSize:11,color:"#166534"}}>승인율</div>
            </div>
            <div style={{padding:12,borderRadius:C.r.md,background:"#EFF6FF",border:"1px solid #93C5FD",textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:700,color:"#1E40AF"}}>1.8일</div>
              <div style={{fontSize:11,color:"#1E40AF"}}>평균 처리</div>
            </div>
            <div style={{padding:12,borderRadius:C.r.md,background:"#FFFBEB",border:"1px solid #FCD34D",textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:700,color:"#92400E"}}>4%</div>
              <div style={{fontSize:11,color:"#92400E"}}>반려율</div>
            </div>
          </div>
        </div>}

      </div>
    </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
