/* ─── Audit Trail — execution_event_log (Append-Only) ───
   DB Schema v1.1 §4.1.2 / Audit Trail Data Model v1.1
   동일 스키마: Screen 1(explore) / 10(requirement) / 11(condition) / 12(validation) / 2(execute)

   프로토타입: 콘솔 로그 + auditTrail 배열 누적 */
var auditTrail = [];
function logEvent(evt) {
  var entry = {
    event_id: crypto.randomUUID ? crypto.randomUUID() : ("evt-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8)),
    screen: evt.screen || "execute",
    timestamp: new Date().toISOString(),
    previous_state: evt.from || null,
    new_state: evt.to || null,
    trigger_source: evt.trigger || "user",
    engine_code: evt.engine || "A05",
    event_type: evt.type || "state_transition",
    payload: evt.payload || null,
  };
  auditTrail.push(entry);
  if (DEV_MODE) console.log("[AUDIT:execute]", entry.event_type, entry.engine_code, entry.previous_state, "→", entry.new_state, entry.payload ? JSON.stringify(entry.payload).slice(0, 80) : "");
}

/* ─── GT Code Bridge ───

var GT_CODE_TO_JOURNEY = {
  // Catalog (경로 A 완결 — Screen 2 미진입, cat miniFlow만 해당)
  G01: "cat", G02: "cat", G03: "cat", G04: "cat", G05: "cat", G09: "cat", G10: "cat",
  // PR (경로 C)
  G06: "pr", G07: "pr", G08: "pr", G26: "pr",
  // RFQ (경로 D)
  G11: "rfq", G12: "rfq", G13: "rfq", G14: "rfq", G15: "rfq",
  // Contract (경로 A/B)
  G16: "con", G17: "con", G18: "con",
  // Rental (경로 B — con 경유)
  G19: "con",
  // Subscription (경로 B)
  G20: "sub", G27: "sub", G28: "sub",
  // Service (경로 C/D)
  G21: "svc", G22: "svc", G23: "svc", G24: "svc", G25: "svc", G29: "svc", G30: "svc",
  // Emergency (경로 A — 예외)
  G31: "urg",
  // Special (경로 C)
  G32: "exc", G35: "exc",
  // Strategic (경로 D)
  G33: "str", G34: "str",
  // Contact (경로 A 완결 — Screen 2 미진입)
  CONTACT: null,
};

function gtCodeToJourneyType(gtCode) {
  return GT_CODE_TO_JOURNEY[gtCode] || "pr"; // fallback: 일반 PR
}

/* ─── Validated Package 수신 인터페이스 ───
   Screen 12(validation) → Screen 2(execute) 핸드오프
   프로덕션: URL 파라미터 또는 상태관리(Redux/Zustand)로 전달
   프로토타입: parseValidatedPackage()로 mock 데이터 해석 */
function parseValidatedPackage(pkg) {
  if (!pkg || !pkg.gtCode) return null;
  var journeyType = gtCodeToJourneyType(pkg.gtCode);
  var route = GT_ROUTE[pkg.gtCode] || "C";

  // 경로 A 완결 건 차단 (G31 긴급은 예외)
  if (route === "A" && pkg.gtCode !== "G31" && journeyType !== "cat") {
    if (DEV_MODE) console.warn("[EXECUTE] Route A item blocked:", pkg.gtCode, "— should complete in Screen 1");
    return null;
  }

  // BT prAllowed 차단
  if (pkg.btCode && BT_META_REF[pkg.btCode]) {
    var bt = BT_META_REF[pkg.btCode];
    if (bt.prAllowed === false && pkg.btCode !== "BT-A") {
      if (DEV_MODE) console.warn("[EXECUTE] BT prAllowed=false blocked:", pkg.btCode, "— dept_request item");
      return null;
    }
  }

  logEvent({
    screen: "execute", from: "VALIDATED", to: "IN_PROGRESS", trigger: "system",
    engine: "A05", type: "handoff_receive",
    payload: { gtCode: pkg.gtCode, btCode: pkg.btCode || null, route: route, journeyType: journeyType }
  });

  return {
    journeyType: journeyType,
    gtCode: pkg.gtCode,
    btCode: pkg.btCode || null,
    route: route,
    reqCard: pkg.reqCard || null,
    condProfile: pkg.condProfile || null,
    attachments: pkg.attachments || [],
    confidence: pkg.confidence || null,
    category: pkg.category || null,
    contract: pkg.contract || null,
    l3Code: pkg.l3Code || null,
  };
}

function buildSteps(gt,subKey){
  const on=GT_ON[gt].on;
  const sd=subKey&&SUB_DATA[subKey]?SUB_DATA[subKey]:null;
  return MASTER_STEPS.filter(s=>on.includes(s.id)).map((s,i,arr)=>{
    const rawSup=s.suppliers?.[gt];
    const supArr=Array.isArray(rawSup)?rawSup:(rawSup&&typeof rawSup==="object"?(rawSup[subKey]||rawSup._||null):null);
    const base={
    ...s,
    ai:gv(s.ai,gt),detail:gv(s.detail,gt),
    wait:s.wait?{msg:gv(s.wait.msg,gt),dur:gv(s.wait.dur,gt),notify:gv(s.wait.notify,gt)}:null,
    suppliers:supArr?.map(calcSup)||null,
    quotes:s.quotes?.[gt]||null,
    preview:s.preview?.[gt]||null,
    selection:s.selection?.[gt]||null,
    panel:s.panel?.[gt]||null,
    actions:ga(s.actions,gt),
    final:i===arr.length-1,
    };
    if(sd&&s.id==="a05"){
      base.suppliers=sd.suppliers?.map(calcSup)||base.suppliers;
      base.panel=sd.panel05||base.panel;
      if(sd.ai05)base.ai=sd.ai05;
    }
    if(sd&&s.id==="a07"&&sd.quotes)base.quotes=sd.quotes;
    if(sd&&s.id==="a09"&&sd.selection)base.selection=sd.selection;
    return base;
  });
}

                    {curStep.actions.map((a,ai)=><button key={ai} onClick={()=>{
                      setMsgs(p=>[...p,{r:"u",c:a}]);
                      const nextIdx=miniStep+1;
                      if(flow[nextIdx]){
                        setMiniStep(nextIdx);
                        setTimeout(()=>setMsgs(p=>[...p,{r:"sys",c:flow[nextIdx].ai}]),800);
                        if(!flow[nextIdx].actions){setTimeout(()=>{collectEvent("COMPLETE",{});const packet=buildEvidencePacket();setCompletedExecs(p=>[...p,packet]);setMsgs(p=>[...p,{r:"done",c:"완료되었어요! 진행 상황은 알림으로 안내해 드릴게요."}]);setDone(true);},2000);}
                      }
                    }} style={{padding:"8px 18px",borderRadius:T.radius.full,border:ai===0?"none":`1px solid ${T.border.medium}`,background:ai===0?T.state.complete.accent:T.surface,color:ai===0?T.text.inverse:T.text.secondary,fontSize:12,cursor:"pointer",fontWeight:ai===0?600:400,letterSpacing:-0.2}}>{a}</button>)}
                  </div>;
                })()}
                {done&&<div style={{marginTop:16,textAlign:"center"}}><button onClick={reset} style={{padding:"8px 20px",borderRadius:T.radius.full,border:`1px solid ${T.border.medium}`,background:T.surface,fontSize:13,cursor:"pointer",color:T.text.secondary}}>처음으로</button></div>}
                {!done&&miniMode&&<div style={{marginTop:12,textAlign:"right"}}><button onClick={reset} style={{padding:"5px 14px",borderRadius:T.radius.full,border:`1px solid ${T.border.light}`,background:T.surface,fontSize:11,cursor:"pointer",color:T.text.muted}}>처음으로</button></div>}
              </>}

              {/* Messages */}
              {msgs.map((m,i)=>{
                if(m.r==="u")return <div key={i} style={{display:"flex",justifyContent:"flex-end"}}><div style={{background:T.text.primary,color:T.text.inverse,padding:"10px 16px",borderRadius:`${T.radius.lg}px ${T.radius.lg}px 4px ${T.radius.lg}px`,maxWidth:"70%",fontSize:14,letterSpacing:-0.2,lineHeight:1.6}}>{m.c}</div></div>;
                if(m.r==="sys")return <div key={i} style={{display:"flex",gap:10}}><div style={{width:30,height:30,borderRadius:T.radius.full,background:T.brandLt,color:T.text.inverse,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>AI</div><div style={{background:T.surface,padding:"12px 16px",borderRadius:`4px ${T.radius.lg}px ${T.radius.lg}px ${T.radius.lg}px`,border:`1px solid ${T.border.light}`,fontSize:14,color:T.text.secondary,lineHeight:1.7,whiteSpace:"pre-wrap",letterSpacing:-0.2,boxShadow:T.shadow.sm}}>{m.c}</div></div>;
                if(m.r==="done")return <div key={i} style={{display:"flex",gap:10}}><div style={{width:30,height:30,borderRadius:T.radius.full,background:T.state.complete.accent,color:T.text.inverse,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>✓</div><div><div style={{background:T.state.complete.bg,padding:"14px 18px",borderRadius:`4px ${T.radius.lg}px ${T.radius.lg}px ${T.radius.lg}px`,border:`1px solid ${T.state.complete.border}`,fontSize:14,color:T.state.complete.fg,lineHeight:1.7,whiteSpace:"pre-wrap",fontWeight:500,letterSpacing:-0.2}}>{m.c}</div><div style={{display:"flex",gap:8,marginTop:8}}><button onClick={()=>setScreenMode("evidence_list")} style={{padding:"8px 18px",borderRadius:T.radius.full,border:"none",background:T.brand,color:"#FFF",fontSize:12,fontWeight:600,cursor:"pointer"}}>📋 Evidence(증적) 보기</button><button onClick={reset} style={{padding:"8px 18px",borderRadius:T.radius.full,border:"1px solid "+T.border.medium,background:T.surface,color:T.text.secondary,fontSize:12,cursor:"pointer"}}>처음으로</button></div></div></div>;
                if(m.r==="gov"){const isStop=m.govType==="stop";const gst=isStop?T.state.blocked:T.state.review;return <div key={i} style={{display:"flex",gap:10}}><div style={{width:30,height:30,borderRadius:T.radius.full,background:gst.accent,color:T.text.inverse,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0,fontWeight:700}}>{isStop?"!":"?"}</div><div style={{maxWidth:"85%"}}><div style={{background:gst.bg,padding:"14px 18px",borderRadius:`4px ${T.radius.lg}px ${T.radius.lg}px ${T.radius.lg}px`,border:`2px solid ${gst.accent}`}}><p style={{fontSize:14,color:gst.fg,margin:0,lineHeight:1.7,whiteSpace:"pre-wrap",fontWeight:600}}>{m.c}</p>{govData&&<div style={{marginTop:8}}>{govData.signals.map((s,si)=><div key={si} style={{display:"flex",alignItems:"center",gap:6,padding:"3px 0",fontSize:12}}><div style={{width:8,height:8,borderRadius:4,background:s.ok?T.state.complete.accent:gst.accent}}/><span style={{color:gst.fg}}>{s.k}: {s.v}</span></div>)}</div>}{isStop&&<div style={{marginTop:8,padding:"6px 10px",borderRadius:T.radius.sm,background:"#FFF",border:`1px solid ${gst.accent}`,fontSize:10,color:gst.fg}}>UX Freeze: ① 직접 재개 금지 ② HR 없이 승인 금지 ③ 이동 금지 ④ Warning 축소 금지</div>}{govState&&i===msgs.length-1&&<div style={{marginTop:10}}><textarea value={govReason} onChange={e=>setGovReason(e.target.value)} placeholder={isStop?"해제/종료 사유 (필수)":"승인/반려 사유 (필수)"} style={{width:"100%",padding:8,borderRadius:T.radius.sm,border:`1px solid ${T.border.medium}`,fontSize:12,minHeight:40,resize:"vertical",fontFamily:T.font.sans}}/><div style={{display:"flex",gap:6,marginTop:8}}>{isStop?<><button disabled={!govReason.trim()} onClick={()=>{setGovState(null);setMsgs(p=>[...p,{r:"sys",c:"Release — 보완 후 재점검합니다.\n사유: "+govReason}]);}} style={{flex:1,padding:"7px",borderRadius:T.radius.full,border:"none",background:govReason.trim()?T.state.review.accent:T.border.light,color:govReason.trim()?"#FFF":T.text.muted,fontSize:12,fontWeight:600,cursor:govReason.trim()?"pointer":"default"}}>Release</button><button disabled={!govReason.trim()} onClick={()=>{setGovState(null);setMsgs(p=>[...p,{r:"done",c:"Terminate — 실행 종료.\n사유: "+govReason}]);setDone(true);}} style={{padding:"7px 14px",borderRadius:T.radius.full,border:`1px solid ${govReason.trim()?gst.accent:T.border.light}`,background:T.surface,color:govReason.trim()?gst.fg:T.text.muted,fontSize:12,cursor:govReason.trim()?"pointer":"default"}}>Terminate</button></>:<><button disabled={!govReason.trim()} onClick={()=>{setGovState(null);setMsgs(p=>[...p,{r:"sys",c:"Approve — 진행합니다.\n사유: "+govReason}]);}} style={{flex:1,padding:"7px",borderRadius:T.radius.full,border:"none",background:govReason.trim()?T.state.complete.accent:T.border.light,color:govReason.trim()?"#FFF":T.text.muted,fontSize:12,fontWeight:600,cursor:govReason.trim()?"pointer":"default"}}>Approve</button><button disabled={!govReason.trim()} onClick={()=>{setGovState("STOP");setGovData({reason:"반려: "+govReason,severity:"HARD",signals:[{k:"반려",v:govReason,ok:false}]});setGovReason("");setMsgs(p=>[...p,{r:"gov",c:"EXECUTION_BLOCKED — 반려됨.",govType:"stop"}]);}} style={{padding:"7px 14px",borderRadius:T.radius.full,border:`1px solid ${govReason.trim()?gst.accent:T.border.light}`,background:T.surface,color:govReason.trim()?gst.fg:T.text.muted,fontSize:12,cursor:govReason.trim()?"pointer":"default"}}>Reject</button></>}</div></div>}</div></div></div>;}
                if(m.r==="wait")return <div key={i} style={{display:"flex",gap:10}}><div style={{width:30,height:30,borderRadius:T.radius.full,background:T.brandLt,color:T.text.inverse,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>AI</div><div style={{maxWidth:"80%"}}><div style={{background:T.state.progress.bg,padding:"14px 18px",borderRadius:`4px ${T.radius.lg}px ${T.radius.lg}px ${T.radius.lg}px`,border:`1px solid ${T.state.progress.border}`}}><p style={{fontSize:14,color:T.state.progress.fg,margin:0,lineHeight:1.7,whiteSpace:"pre-wrap",letterSpacing:-0.2}}>{m.c}</p><div style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:8,padding:"4px 10px",borderRadius:T.radius.sm,background:T.surface,border:`1px solid ${T.border.light}`}}><span style={{fontSize:13}}>⏳</span><span style={{fontSize:12,color:T.text.secondary}}>{m.duration}</span></div></div>{i===msgs.length-1&&!done&&<button onClick={()=>onNotify(m)} style={{marginTop:10,padding:"8px 18px",borderRadius:T.radius.full,border:`2px dashed ${T.state.review.border}`,background:T.state.review.bg,color:T.state.review.fg,fontSize:12,cursor:"pointer",fontWeight:600,letterSpacing:-0.2}}>알림 도착 (시뮬레이션)</button>}</div></div>;
                if(m.r==="notify")return <div key={i} style={{display:"flex",justifyContent:"center"}}><div style={{padding:"8px 18px",borderRadius:T.radius.full,background:T.state.review.bg,border:`1px solid ${T.state.review.border}`,fontSize:13,color:T.state.review.fg,fontWeight:600,letterSpacing:-0.2}}>🔔 {m.c}</div></div>;
                if(m.r==="sealed")return <div key={i} style={{display:"flex",gap:10}}><div style={{width:30,height:30,borderRadius:T.radius.full,background:"#7C3AED",color:T.text.inverse,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>🔒</div><div style={{maxWidth:"80%"}}><div style={{background:"#F5F3FF",padding:"14px 18px",borderRadius:`4px ${T.radius.lg}px ${T.radius.lg}px ${T.radius.lg}px`,border:"1px solid #DDD6FE"}}><p style={{fontSize:14,color:"#5B21B6",margin:0,lineHeight:1.7,whiteSpace:"pre-wrap",letterSpacing:-0.2,fontWeight:500}}>{m.c}</p></div>{i===msgs.length-1&&!done&&<button onClick={()=>unsealQuotes(m)} style={{marginTop:10,padding:"8px 18px",borderRadius:T.radius.full,border:"2px solid #7C3AED",background:"#7C3AED",color:"#FFF",fontSize:12,cursor:"pointer",fontWeight:700,letterSpacing:-0.2}}>🔓 마감 완료 — 견적 개봉</button>}</div></div>;
                if(m.r==="compact")return <div key={i} style={{display:"flex",gap:8,alignItems:"center"}}><div style={{width:24,height:24,borderRadius:12,background:m.color||T.state.complete.accent,color:T.text.inverse,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,flexShrink:0,fontWeight:700}}>{m.agent?.replace("A","")}</div><div style={{padding:"6px 14px",borderRadius:T.radius.md,background:T.state.complete.bg,border:`1px solid ${T.state.complete.border}`,fontSize:13,color:T.state.complete.fg,fontWeight:500,letterSpacing:-0.2}}>{m.c}</div></div>;
                const ac=m.color||T.brandLt;
                return <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <div style={{width:30,height:30,borderRadius:T.radius.full,background:ac,color:T.text.inverse,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,flexShrink:0,fontWeight:700}}>{m.agent?.replace("A","")}</div>
                  <div style={{maxWidth:"85%"}}><div style={{background:T.surface,padding:"12px 16px",borderRadius:`4px ${T.radius.lg}px ${T.radius.lg}px ${T.radius.lg}px`,border:`1px solid ${T.border.light}`,boxShadow:T.shadow.sm}}>
                    <p style={{fontSize:14,color:T.text.primary,margin:0,lineHeight:1.7,whiteSpace:"pre-wrap",letterSpacing:-0.2}}>{m.c}</p>
                    {m.detail&&<p style={{fontSize:12,color:T.text.secondary,margin:"6px 0 0",whiteSpace:"pre-wrap"}}>{m.detail}</p>}
                  </div></div>
                </div>;
              })}
              {busy&&<div style={{display:"flex",gap:10}}><div style={{width:30,height:30,borderRadius:T.radius.full,background:T.brandLt,color:T.text.inverse,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>AI</div><div style={{background:T.surface,padding:"12px 16px",borderRadius:`4px ${T.radius.lg}px ${T.radius.lg}px ${T.radius.lg}px`,border:`1px solid ${T.border.light}`,fontSize:13,color:T.text.muted,letterSpacing:-0.2}}>다음 단계를 준비하고 있어요...</div></div>}
            </div>
          </div>

          {/* Right: Panel */}
          {steps.length>0&&(()=>{const cs=steps[step];const lastA=msgs.filter(m=>m.r==="a").slice(-1)[0];const waiting=msgs.some(m=>m.r==="wait"&&m.stepIdx===step);const canAct=!done&&!busy&&!waiting&&lastA&&lastA.stepIdx===step;
          return <div style={{width:320,background:T.surface,borderLeft:`1px solid ${T.border.light}`,flexShrink:0,display:"flex",flexDirection:"column",position:"relative"}}>
            {/* Aux Panel Overlay */}
            {auxPanel&&<div style={{position:"absolute",inset:0,zIndex:10,background:T.surface,display:"flex",flexDirection:"column",overflow:"hidden"}}>
              {auxPanel.t==="search"&&<AuxSearch title={auxPanel.title} mode={auxPanel.mode} onDone={auxPanel.cb} onClose={()=>setAuxPanel(null)}/>}
              {auxPanel.t==="form"&&<AuxForm title={auxPanel.title} fields={auxPanel.fields} onDone={auxPanel.cb} onClose={()=>setAuxPanel(null)}/>}
              {auxPanel.t==="compare"&&<AuxCompare title={auxPanel.title} items={auxPanel.items} onDone={auxPanel.cb} onClose={()=>setAuxPanel(null)}/>}
              {auxPanel.t==="check"&&<AuxCheck title={auxPanel.title} secs={auxPanel.secs} upload={auxPanel.upload} onDone={auxPanel.cb} onClose={()=>setAuxPanel(null)}/>}
            </div>}
            {/* Panel Header */}
            <div style={{padding:"12px 16px",borderBottom:`1px solid ${T.border.light}`,display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:24,height:24,borderRadius:12,background:cs?.color||T.brandLt,color:T.text.inverse,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700}}>{step+1}</div>
              <span style={{fontSize:14,fontWeight:600,color:T.text.primary,letterSpacing:-0.3}}>{cs?.label}</span>
              {round>1&&<Badge color={T.state.review.fg} bg={T.state.review.bg}>R{round}</Badge>}
            </div>

            {/* Coaching Card — 패널 상단 고정 */}
            {coachMode&&cs&&COACHING[cs.id]&&(
              <div style={{padding:"8px 14px",background:"#FFFBEB",borderBottom:"2px solid #FCD34D"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#92400E",marginBottom:3}}>💡 {COACHING[cs.id].tip}</div>
                <div style={{fontSize:11,color:"#78350F",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{COACHING[cs.id].guide}</div>
              </div>
            )}

            {/* Panel Body */}
            <div style={{flex:1,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:12}}>
              {/* Suppliers */}
              {cs?.suppliers&&<div>
                <div style={{fontSize:11,fontWeight:600,color:T.text.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>공급사 후보</div>
                {cs.suppliers.map((s,si)=><div key={si} style={{padding:"10px 12px",borderRadius:T.radius.md,border:`1px solid ${T.border.light}`,background:T.surfAlt,marginBottom:5}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div><div style={{fontSize:13,fontWeight:600,color:T.text.primary,letterSpacing:-0.2}}>{s.n}</div><div style={{fontSize:11,color:T.text.secondary,marginTop:1}}>{s.d}</div></div>
                    <div style={{textAlign:"right"}}>
                      <div style={{display:"flex",gap:3,justifyContent:"flex-end",marginBottom:3}}>{["fin","del","qual","esg"].map(k=><span key={k} style={{width:8,height:8,borderRadius:4,background:s[k]==="g"?T.state.complete.accent:s[k]==="y"?T.state.review.accent:T.state.blocked.accent}}/>)}</div>
                      <div style={{fontSize:10,fontWeight:500,color:s.risk==="낮음"?T.state.complete.fg:s.risk==="보통"?T.state.review.fg:T.state.blocked.fg}}>{s.risk} · {s.sc}점</div>
                    </div>
                  </div>
                </div>)}
              </div>}

              {/* Quotes */}
              {cs?.quotes&&<div>
                <div style={{fontSize:11,fontWeight:600,color:T.text.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>견적 비교</div>
                {cs.quotes.map((q,qi)=><div key={qi} style={{padding:"10px 12px",borderRadius:T.radius.md,border:q.best?`2px solid ${T.state.complete.accent}`:`1px solid ${T.border.light}`,background:q.best?T.state.complete.bg:T.surfAlt,marginBottom:5}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div><div style={{fontSize:13,fontWeight:600,color:T.text.primary,letterSpacing:-0.2}}>{q.n}{q.best&&<Badge color={T.state.complete.fg} bg={T.state.complete.bg}>추천</Badge>}</div><div style={{fontSize:11,color:T.text.secondary,marginTop:1}}>{q.note}</div></div>
                    <div style={{textAlign:"right"}}><div style={{fontSize:14,fontWeight:600,color:T.text.primary}}>{q.price}</div><div style={{fontSize:11,color:T.text.secondary}}>납기 {q.delivery}</div></div>
                  </div>
                </div>)}
              </div>}

              {/* Preview */}
              {cs?.preview&&<div>
                <div style={{fontSize:11,fontWeight:600,color:T.text.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>{cs.preview.type} 요청서</div>
                <div style={{padding:"10px 12px",borderRadius:T.radius.md,border:`1px solid ${T.state.review.border}`,background:T.state.review.bg}}>
                  <div style={{display:"grid",gridTemplateColumns:"60px 1fr",gap:"4px 8px",fontSize:12}}>
                    <span style={{color:T.text.muted}}>품목</span><span style={{color:T.text.primary,fontWeight:500}}>{cs.preview.item}</span>
                    <span style={{color:T.text.muted}}>수량</span><span style={{color:T.text.primary,fontWeight:500}}>{cs.preview.qty}</span>
                    <span style={{color:T.text.muted}}>사양</span><span style={{color:T.text.primary,fontWeight:500}}>{cs.preview.spec}</span>

                  </div>
                </div>

              {/* Selection */}
              {cs?.selection&&<div>
                <div style={{fontSize:11,fontWeight:600,color:T.text.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>종합 평가</div>
                <div style={{padding:"12px 14px",borderRadius:T.radius.md,border:`2px solid ${T.state.complete.accent}`,background:T.state.complete.bg,marginBottom:6}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <div><span style={{fontSize:14,fontWeight:700,color:T.state.complete.fg,letterSpacing:-0.3}}>{cs.selection.winner}</span><Badge color={T.state.complete.fg} bg="#DCFCE7">선정</Badge></div>

                    <div style={{flex:1,height:5,borderRadius:3,background:T.border.light}}><div style={{width:sc.v+"%",height:5,borderRadius:3,background:sc.v>=90?T.state.complete.accent:sc.v>=80?T.state.progress.accent:T.state.review.accent,transition:"width .5s"}}/></div>
                    <span style={{fontSize:10,color:T.text.primary,width:18,fontWeight:600}}>{sc.v}</span>
                  </div>)}
                </div>
                <div style={{padding:"6px 10px",borderRadius:T.radius.sm,background:T.surfAlt,border:`1px solid ${T.border.light}`,display:"flex",justifyContent:"space-between",fontSize:11,color:T.text.secondary}}>
                  <span>차순위: {cs.selection.runner}</span><span>{cs.selection.runnerTotal}점 (차이 +{cs.selection.total-cs.selection.runnerTotal})</span>
                </div>

              {/* Panel Sections */}
              {cs?.panel&&<div>
                {cs.panel.sections.map((sec,si)=><div key={si} style={{marginBottom:10}}>
                  <div style={{fontSize:11,fontWeight:600,color:T.text.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>{sec.label}</div>
                  {sec.type==="history"&&sec.data.map((h,hi)=><div key={hi} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderBottom:hi<sec.data.length-1?`1px solid ${T.border.light}`:"none"}}><span style={{color:T.text.primary,fontWeight:500}}>{h.n}</span><span style={{color:T.text.secondary,fontSize:11}}>{h.v}</span></div>)}
                  {sec.type==="info"&&<div style={{fontSize:12,color:T.text.primary,padding:"2px 0",letterSpacing:-0.2}}>{sec.data}</div>}
                  {sec.type==="alert"&&<div style={{fontSize:12,color:T.state.blocked.fg,padding:"8px 10px",borderRadius:T.radius.sm,background:T.state.blocked.bg,border:`1px solid ${T.state.blocked.border}`,letterSpacing:-0.2}}>{sec.data}</div>}
                  {sec.type==="check"&&sec.data.map((c,ci)=><div key={ci} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,padding:"3px 0"}}><div style={{width:7,height:7,borderRadius:4,background:c.ok?T.state.complete.accent:T.state.review.accent}}/><span style={{color:T.text.primary,letterSpacing:-0.2}}>{c.label}</span></div>)}
                </div>)}
              </div>}

              {/* Empty */}
              {!cs?.suppliers&&!cs?.quotes&&!cs?.preview&&!cs?.selection&&!cs?.panel&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",flex:1,padding:20}}>
                <div style={{textAlign:"center",color:T.text.muted,fontSize:13}}>{done?"구매가 완료되었어요":"단계별 정보가 여기에 표시됩니다"}</div>
              </div>}
            </div>

            {/* Actions */}
            {canAct&&<div style={{padding:"12px 14px",borderTop:`1px solid ${T.border.light}`,flexShrink:0}}>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {lastA.actions&&lastA.actions.length>0?lastA.actions.map((a,ai)=><button key={ai} onClick={()=>pick(a,lastA)} style={{padding:"8px 16px",borderRadius:T.radius.full,border:ai===0?"none":`1px solid ${a.includes("제외")||a.includes("수정")?T.state.blocked.border:T.border.medium}`,background:ai===0?T.state.complete.accent:T.surface,color:ai===0?T.text.inverse:(a.includes("제외")||a.includes("수정")?T.state.blocked.fg:T.text.secondary),fontSize:12,cursor:"pointer",fontWeight:ai===0?600:400,flex:ai===0?"1 0 auto":"0 0 auto",letterSpacing:-0.2,transition:"all .15s"}}>{a}</button>):<>
                  <button onClick={()=>pick("확인하고 진행",lastA)} style={{flex:1,padding:"8px 16px",borderRadius:T.radius.full,border:"none",background:T.state.complete.accent,color:T.text.inverse,fontSize:13,cursor:"pointer",fontWeight:600,letterSpacing:-0.2}}>확인하고 진행</button>
                  <button onClick={()=>pick("수정 필요",lastA)} style={{padding:"8px 16px",borderRadius:T.radius.full,border:`1px solid ${T.state.blocked.border}`,background:T.surface,color:T.state.blocked.fg,fontSize:12,cursor:"pointer",letterSpacing:-0.2}}>수정 필요</button>
                </>}
              </div>
            </div>}
          </div>})()}
        </div>
      </div>

      {/* ═══ Evidence 화면 (목록 + 상세) — Compliance Evidence Packaging v1.0 §4 ═══ */}
      {screenMode!=="execute"&&(()=>{
        const ep=selectedEvidence;
        const EInfoRow=({l,v,ok})=><div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid "+T.border.light,fontSize:12}}><span style={{color:T.text.muted}}>{l}</span><span style={{color:ok===false?"#DC2626":ok===true?"#166534":T.text.primary,fontWeight:500}}>{v}</span></div>;
        const totalSavings=completedExecs.reduce((s,e)=>{const m=e.evidence?.savings?.match(/₩([\d,]+)만.*절감/);return s+(m?parseInt(m[1].replace(/,/g,"")):0);},0);
        return <div style={{position:"fixed",inset:0,zIndex:999,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{width:"92%",maxWidth:960,maxHeight:"90vh",background:T.surface,borderRadius:T.radius.xl,overflow:"hidden",boxShadow:"0 24px 80px rgba(0,0,0,.35)",display:"flex",flexDirection:"column"}}>
            {/* Header */}
            <div style={{padding:"14px 20px",background:`linear-gradient(135deg,${T.brand},${T.brandLt})`,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:32,height:32,borderRadius:8,background:"rgba(255,255,255,.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>✓</div>
                <div><div style={{fontWeight:700,fontSize:15,color:"#FFF"}}>Execution Result — Evidence</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,.7)"}}>{completedExecs.length}건 · Compliance Evidence Packaging v1.0</div></div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>{setSelectedEvidence(null);setScreenMode("evidence_list");}} style={{padding:"5px 14px",borderRadius:T.radius.sm,border:screenMode==="evidence_list"?"2px solid #FFF":"1px solid rgba(255,255,255,.3)",background:screenMode==="evidence_list"?"rgba(255,255,255,.2)":"transparent",color:"#FFF",fontSize:11,fontWeight:screenMode==="evidence_list"?600:400,cursor:"pointer"}}>📋 목록</button>
                {ep&&<button style={{padding:"5px 14px",borderRadius:T.radius.sm,border:"2px solid #FFF",background:"rgba(255,255,255,.2)",color:"#FFF",fontSize:11,fontWeight:600}}>📄 상세</button>}
                <button onClick={()=>{setScreenMode("execute");setSelectedEvidence(null);}} style={{width:28,height:28,borderRadius:T.radius.full,border:"1px solid rgba(255,255,255,.3)",background:"transparent",color:"#FFF",fontSize:14,cursor:"pointer"}}>✕</button>
              </div>
            </div>

            {/* ── 목록 뷰 ── */}
            {screenMode==="evidence_list"&&<div style={{flex:1,overflow:"auto",padding:20}}>
              {/* Savings Summary */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:16}}>
                <div style={{padding:"12px 14px",borderRadius:T.radius.md,background:T.state.complete.bg,border:"1px solid "+T.state.complete.border}}>
                  <div style={{fontSize:10,color:T.state.complete.fg}}>완료 건수</div>
                  <div style={{fontSize:22,fontWeight:700,color:T.state.complete.fg}}>{completedExecs.length}건</div>
                </div>
                <div style={{padding:"12px 14px",borderRadius:T.radius.md,background:T.state.complete.bg,border:"1px solid "+T.state.complete.border}}>
                  <div style={{fontSize:10,color:T.state.complete.fg}}>누적 절감</div>
                  <div style={{fontSize:22,fontWeight:700,color:T.state.complete.fg}}>{totalSavings>0?"₩"+totalSavings.toLocaleString()+"만":"—"}</div>
                </div>
                <div style={{padding:"12px 14px",borderRadius:T.radius.md,background:T.state.review.bg,border:"1px solid "+T.state.review.border}}>
                  <div style={{fontSize:10,color:T.state.review.fg}}>Stop Code</div>
                  <div style={{fontSize:22,fontWeight:700,color:T.state.review.fg}}>{completedExecs.reduce((s,e)=>s+(e.governance?.stopCodes||0),0)}건</div>
                </div>
                <div style={{padding:"12px 14px",borderRadius:T.radius.md,background:T.state.progress.bg,border:"1px solid "+T.state.progress.border}}>
                  <div style={{fontSize:10,color:T.state.progress.fg}}>Human Review</div>
                  <div style={{fontSize:22,fontWeight:700,color:T.state.progress.fg}}>{completedExecs.reduce((s,e)=>s+(e.governance?.humanReviews||0),0)}회</div>
                </div>
              </div>
              {/* List */}
              {completedExecs.map((e,i)=>{
                const isMock=i<4;
                const gc=e.governance||{};
                return <div key={e.id} onClick={()=>{setSelectedEvidence(e);setScreenMode("evidence_detail");}} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",borderRadius:T.radius.md,border:"1px solid "+T.border.light,background:T.surfAlt,marginBottom:6,cursor:"pointer",transition:"all .15s",borderLeft:"3px solid "+(e.gt==="urg"||e.gt==="exc"?T.state.review.accent:T.state.complete.accent)}}>
                  <div style={{width:36,height:36,borderRadius:10,background:T.state.complete.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{e.gt==="urg"?"⚡":e.gt==="exc"?"⚠️":e.gt==="rfq"?"📊":e.gt==="pr"?"📝":"✓"}</div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:14,fontWeight:600,color:T.text.primary}}>{e.title}</span>
                      <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:T.radius.full,color:T.state.complete.fg,background:T.state.complete.bg}}>완료</span>
                      {isMock&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:4,background:T.border.light,color:T.text.muted}}>더미</span>}
                      {!isMock&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:4,background:"#DBEAFE",color:"#1E40AF"}}>실행</span>}
                    </div>
                    <div style={{fontSize:11,color:T.text.secondary,marginTop:2}}>{e.id} · {e.vendor||"—"} · {e.amount||"—"} · {e.evidence?.duration||"—"}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:11,color:T.text.muted}}>{e.completedAt}</div>
                    <div style={{display:"flex",gap:4,marginTop:4,justifyContent:"flex-end"}}>
                      {gc.stopCodes>0&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:4,background:T.state.blocked.bg,color:T.state.blocked.fg}}>Stop {gc.stopCodes}</span>}
                      {gc.humanReviews>0&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:4,background:T.state.review.bg,color:T.state.review.fg}}>Review {gc.humanReviews}</span>}
                      {gc.overrides>0&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:4,background:T.state.blocked.bg,color:T.state.blocked.fg}}>Override {gc.overrides}</span>}
                      {gc.postObligation&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:4,background:T.state.review.bg,color:T.state.review.fg}}>사후의무</span>}
                    </div>
                  </div>
                  <span style={{fontSize:16,color:T.text.muted}}>›</span>
                </div>;
              })}
              <div style={{padding:10,borderRadius:T.radius.sm,background:T.surfAlt,border:"1px solid "+T.border.light,fontSize:11,color:T.text.secondary,lineHeight:1.6,marginTop:10}}>
                ℹ️ 더미 4건은 시연용 참고 데이터입니다. Execute에서 BJ를 완료하면 5번째부터 실제 실행 이력이 자동 누적됩니다.
              </div>
            </div>}

            {/* ── 상세 뷰 ── */}
            {screenMode==="evidence_detail"&&ep&&<>
              <div style={{padding:"10px 20px",background:T.state.complete.bg,borderBottom:"2px solid "+T.state.complete.border,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
                <div><span style={{fontSize:15,fontWeight:700,color:T.state.complete.fg}}>{ep.title}</span><span style={{fontSize:12,color:T.state.complete.fg,marginLeft:10}}>{ep.id} · {ep.vendor||"—"} · {ep.amount||"—"}</span></div>
                <button onClick={()=>{setSelectedEvidence(null);setScreenMode("evidence_list");}} style={{padding:"4px 12px",borderRadius:T.radius.sm,border:"1px solid "+T.state.complete.border,background:T.surface,fontSize:11,color:T.state.complete.fg,cursor:"pointer"}}>← 목록</button>
              </div>
              <div style={{flex:1,overflow:"auto",padding:20}}>
                {/* §4.1 */}
                <div style={{marginBottom:16}}><div style={{fontSize:13,fontWeight:600,color:T.text.primary,marginBottom:8}}>§4.1 Process Identification</div>
                  <div style={{padding:12,borderRadius:T.radius.md,background:T.surfAlt,border:"1px solid "+T.border.light}}>
                    <EInfoRow l="Session ID" v={ep.processId?.sessionId||"—"}/><EInfoRow l="GuideType" v={ep.processId?.guideType||"—"}/><EInfoRow l="Tier" v={ep.processId?.tier||"—"}/><EInfoRow l="시작" v={ep.requestedAt||"—"}/><EInfoRow l="완료" v={ep.completedAt||"—"}/><EInfoRow l="요청자" v={ep.requester||"—"}/>
                  </div>
                </div>
                {/* §4.2 */}
                <div style={{marginBottom:16}}><div style={{fontSize:13,fontWeight:600,color:T.text.primary,marginBottom:8}}>§4.2 Decision Trace ({ep.decisionTrace?.length||0}건)</div>
                  {(ep.decisionTrace||[]).map((d,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",borderRadius:T.radius.sm,background:T.surfAlt,border:"1px solid "+T.border.light,marginBottom:4}}>
                    <span style={{fontSize:10,color:T.text.muted,width:40,flexShrink:0}}>{d.time}</span>
                    <span style={{fontSize:12,fontWeight:500,color:T.text.primary,flex:1}}>{d.detail||d.event}</span>
                    <div style={{width:60,display:"flex",alignItems:"center",gap:3}}><div style={{flex:1,height:4,borderRadius:2,background:T.border.light}}><div style={{width:Math.round((d.confidence||0)*100)+"%",height:4,borderRadius:2,background:(d.confidence||0)>=0.80?T.state.complete.accent:(d.confidence||0)>=0.60?T.state.review.accent:T.state.progress.accent}}/></div><span style={{fontSize:9,color:T.text.muted}}>{Math.round((d.confidence||0)*100)}%</span></div>
                  </div>)}
                </div>
                {/* §4.3 */}
                <div style={{marginBottom:16}}><div style={{fontSize:13,fontWeight:600,color:T.text.primary,marginBottom:8}}>§4.3 Policy Application ({ep.policyApplication?.length||0}건)</div>
                  {(ep.policyApplication||[]).map((p,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",borderRadius:T.radius.sm,background:T.surfAlt,border:"1px solid "+T.border.light,marginBottom:4}}>
                    <div style={{width:8,height:8,borderRadius:4,background:p.applied?T.state.complete.accent:T.border.medium,flexShrink:0}}/>
                    <div style={{flex:1}}><div style={{fontSize:12,fontWeight:500}}>{p.name} <span style={{fontSize:10,color:T.text.muted}}>{p.ruleId}</span></div><div style={{fontSize:11,color:T.text.secondary}}>{p.result}</div></div>
                    <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:T.radius.full,color:p.applied?T.state.complete.fg:T.text.muted,background:p.applied?T.state.complete.bg:T.state.ready.bg}}>{p.applied?"적용":"미적용"}</span>
                  </div>)}
                </div>
                {/* §4.4 */}
                <div style={{marginBottom:16}}><div style={{fontSize:13,fontWeight:600,color:T.text.primary,marginBottom:8}}>§4.4 Engine Trace ({ep.trace?.length||0}건)</div>
                  <div style={{position:"relative",paddingLeft:28}}>
                    {(ep.trace||[]).map((t,i)=>{const sc=t.state==="COMPLETED"?T.state.complete:t.state==="HUMAN_REVIEW_REQUIRED"?T.state.review:t.state==="EXECUTION_BLOCKED"?T.state.blocked:T.state.progress;return(
                      <div key={i} style={{display:"flex",alignItems:"flex-start",gap:6,marginBottom:4,position:"relative"}}>
                        <div style={{position:"absolute",left:-20,top:0,display:"flex",flexDirection:"column",alignItems:"center"}}><div style={{width:10,height:10,borderRadius:5,background:sc.accent,border:"2px solid "+T.surface,zIndex:1}}/>{i<(ep.trace||[]).length-1&&<div style={{width:1,height:18,background:T.border.light}}/>}</div>
                        <span style={{fontSize:10,color:T.text.muted,width:36,flexShrink:0}}>{t.time}</span>
                        <span style={{fontSize:10,color:sc.fg,width:20,flexShrink:0,fontWeight:600}}>{t.engine}</span>
                        <span style={{fontSize:10,color:T.text.muted,width:20,flexShrink:0}}>{t.agent}</span>
                        <span style={{fontSize:12,color:T.text.primary,fontWeight:500,flex:1}}>{t.label}</span>
                        <span style={{fontSize:11,color:T.text.secondary,maxWidth:140,textAlign:"right"}}>{t.result}</span>
                      </div>);})}
                  </div>
                </div>
                {/* §4.5 */}
                <div style={{marginBottom:16}}><div style={{fontSize:13,fontWeight:600,color:T.text.primary,marginBottom:8}}>§4.5 Governance Intervention</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:10}}>
                    {[{l:"Stop Code",v:ep.governance?.stopCodes||0,ok:(ep.governance?.stopCodes||0)===0},{l:"Human Review",v:(ep.governance?.humanReviews||0)+"회",ok:true},{l:"Override",v:ep.governance?.overrides||0,ok:(ep.governance?.overrides||0)===0},{l:"Escalation",v:ep.governance?.escalations||0,ok:(ep.governance?.escalations||0)===0}].map((g,i)=>(
                      <div key={i} style={{padding:"10px 12px",borderRadius:T.radius.md,background:g.ok?T.state.complete.bg:T.state.blocked.bg,border:"1px solid "+(g.ok?T.state.complete.border:T.state.blocked.border),textAlign:"center"}}><div style={{fontSize:18,fontWeight:700,color:g.ok?T.state.complete.fg:T.state.blocked.fg}}>{g.v}</div><div style={{fontSize:10,color:g.ok?T.state.complete.fg:T.state.blocked.fg}}>{g.l}</div></div>))}
                  </div>
                  {(ep.governance?.details||[]).length>0?(ep.governance.details).map((d,i)=>(
                    <div key={i} style={{padding:10,borderRadius:T.radius.md,background:T.surfAlt,border:"1px solid "+T.border.light,marginBottom:4}}>
                      <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:T.radius.full,color:T.state.review.fg,background:T.state.review.bg}}>{d.type}</span>
                      <span style={{fontSize:10,color:T.text.muted,marginLeft:8}}>{d.time}</span>
                      <div style={{marginTop:4}}><EInfoRow l="판단자" v={d.actor}/><EInfoRow l="결정" v={d.decision} ok={d.decision==="APPROVE"}/><EInfoRow l="사유" v={d.reason}/></div>
                    </div>)):
                    <div style={{padding:12,textAlign:"center",color:T.text.muted,fontSize:12}}>Governance 개입 없음</div>}
                  {ep.governance?.postObligation&&<div style={{marginTop:6,padding:"8px 12px",borderRadius:T.radius.md,background:T.state.review.bg,border:"1px solid "+T.state.review.border,fontSize:12,color:T.state.review.fg}}>⚠️ 사후 의무: {ep.governance.postObligation}</div>}
                </div>
                {/* Supplier */}
                {ep.supplierEvidence?.selected&&<div style={{marginBottom:16}}><div style={{fontSize:13,fontWeight:600,color:T.text.primary,marginBottom:8}}>공급사 Evidence</div>
                  <div style={{padding:12,borderRadius:T.radius.md,border:"2px solid "+T.state.complete.accent,background:T.state.complete.bg}}>
                    <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:14,fontWeight:700,color:T.state.complete.fg}}>{ep.supplierEvidence.selected.name}</span><span style={{fontSize:14,fontWeight:700,color:T.state.complete.fg}}>{ep.supplierEvidence.selected.score}점</span></div>
                    {ep.supplierEvidence.runner&&<div style={{fontSize:11,color:T.text.secondary,marginTop:4}}>차순위: {ep.supplierEvidence.runner.name} ({ep.supplierEvidence.runner.score}점)</div>}
                    {ep.supplierEvidence.benchmark?.market&&<div style={{fontSize:11,color:T.text.muted,marginTop:2}}>시장가: {ep.supplierEvidence.benchmark.market} · 편차: {ep.supplierEvidence.benchmark.deviation||"—"}</div>}
                  </div>
                </div>}
                <div style={{padding:10,borderRadius:T.radius.sm,background:T.surfAlt,border:"1px solid "+T.border.light,fontSize:11,color:T.text.secondary,lineHeight:1.6}}>
                  ℹ️ Immutable Log · A-T: A05→T07+T13 / A06→T08 / A07→T06+T10 / A08→T13+T14 / A09→T08+T13 / A10→T12+T11 / A13→T15
                </div>
              </div>
            </>}

            {/* Footer */}
            <div style={{padding:"12px 20px",borderTop:"1px solid "+T.border.light,display:"flex",gap:8,flexShrink:0}}>
              {screenMode==="evidence_detail"&&<><button style={{padding:"8px 16px",borderRadius:T.radius.full,border:"1px solid "+T.border.medium,background:T.surface,fontSize:12,color:T.text.secondary,cursor:"pointer"}}>PDF Export</button>
              <button style={{padding:"8px 16px",borderRadius:T.radius.full,border:"1px solid "+T.border.medium,background:T.surface,fontSize:12,color:T.text.secondary,cursor:"pointer"}}>감사 리포트</button></>}
              <button onClick={()=>{setScreenMode("execute");setSelectedEvidence(null);}} style={{padding:"8px 16px",borderRadius:T.radius.full,border:"none",background:T.brand,fontSize:12,color:"#FFF",fontWeight:600,cursor:"pointer",marginLeft:"auto"}}>구매 실행으로 돌아가기</button>
            </div>
          </div>
        </div>;
      })()}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
