              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div>
                  <span style={{fontSize:14,fontWeight:600,color:T.text.primary}}>{s.name}</span>
                  <span style={{fontSize:11,color:T.text.muted,marginLeft:8}}>점유율 {s.share}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:16,fontWeight:700,color:T.brand}}>{s.amount}</span>
                  <div style={{display:"flex",gap:2}}>{["fin","del","qual","esg"].map(function(k){return <RiskDot key={k} level={s.riskScores[k]}/>;})}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:12,fontSize:11}}>
                <span style={{color:T.text.secondary}}>계약 {s.contracts}건</span>
                <span style={{color:s.risk==="낮음"?T.state.complete.fg:T.state.review.fg}}>리스크: {s.risk}</span>
                <span style={{color:T.text.muted}}>추세: {s.trend==="stable"?"안정":"증가"}</span>
              </div>
            </div>
          );})}

          <div style={{padding:12,borderRadius:T.radius.md,background:T.state.review.bg,border:"1px solid "+T.state.review.border,marginTop:12}}>
            <div style={{fontSize:12,fontWeight:600,color:T.state.review.fg,marginBottom:4,display:"flex",alignItems:"center",gap:6}}>
              <span>공급사 집중도 경고</span>
              <SigBadge type="competitive"/>
            </div>
            <div style={{fontSize:12,color:T.state.review.fg,lineHeight:1.6}}>상위 3개 공급사 점유율 34.2% — 특정 공급사 의존도가 높습니다. Competitive Sourcing Signal: "공급사 집중도 과다" (Signal Def. §5.1.4). 대체 공급사 확보를 권장합니다.</div>
          </div>
        </div>}

        {/* ═══ 절감 기회 §3.2 (5종 완전) ═══ */}
        {tab==="savings"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:600,color:T.text.primary}}>절감 기회 분석</div>
            <div style={{padding:"6px 14px",borderRadius:T.radius.md,background:T.state.complete.bg,border:"1px solid "+T.state.complete.border}}>
              <span style={{fontSize:12,fontWeight:600,color:T.state.complete.fg}}>총 절감 가능액: ₩{(SAVINGS_OPP.reduce(function(s,o){var n=o.impact.replace(/[^0-9]/g,"");return s+parseInt(n||0);},0)/10000).toFixed(1)}억</span>
            </div>
          </div>

          {/* Filter */}
          <div style={{display:"flex",gap:4,marginBottom:12,flexWrap:"wrap"}}>
            {[{id:"all",l:"전체"},{id:"consolidation",l:"§3.2.1 구매 통합"},{id:"long_term",l:"§3.2.2 장기 계약"},{id:"renegotiation",l:"§3.2.3 재협상"},{id:"substitution",l:"§3.2.4 대체 품목"},{id:"demand_pattern",l:"§3.2.5 수요 패턴"}].map(function(f){return(
              <button key={f.id} onClick={function(){setSavingsFilter(f.id);}} style={{padding:"4px 10px",borderRadius:T.radius.full,border:savingsFilter===f.id?"none":"1px solid "+T.border.medium,background:savingsFilter===f.id?T.brand:T.surface,color:savingsFilter===f.id?"#FFF":T.text.muted,fontSize:11,fontWeight:savingsFilter===f.id?600:400}}>{f.l}</button>
            );})}
          </div>

          {filteredSavings.map(function(s,i){var pc=s.priority==="High"?T.state.blocked:s.priority==="Medium"?T.state.review:{bg:T.surfAlt,fg:T.text.muted,accent:T.text.muted,border:T.border.light};return(
            <div key={i} style={{padding:14,borderRadius:T.radius.md,background:T.surfAlt,border:"1px solid "+T.border.light,marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:14,fontWeight:600,color:T.text.primary}}>{s.title}</span>
                  <Badge color={pc.fg} bg={pc.bg}>{s.priority}</Badge>
                  <Badge color={T.text.secondary} bg={T.surfAlt}>{s.status}</Badge>
                  <Badge color={T.state.progress.fg} bg={T.state.progress.bg}>{SAVINGS_TYPE_LABEL[s.type]||s.type}</Badge>
                </div>
                <span style={{fontSize:16,fontWeight:700,color:T.state.complete.accent}}>{s.impact}</span>
              </div>
              <div style={{fontSize:12,color:T.text.secondary,lineHeight:1.6}}>{s.desc}</div>
              <div style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:T.text.muted,marginTop:4}}>
                <span>{"분석: "+s.engine}</span>
                <SigBadge type={s.signal}/>
              </div>
            </div>
          );})}

          <div style={{padding:10,borderRadius:T.radius.sm,background:"#F0F4FF",border:"1px solid #BFDBFE",fontSize:11,color:"#1E40AF",lineHeight:1.6,marginTop:8}}>
            ℹ️ 절감 기회는 AI가 수요 패턴, 유사 사례, 비용 비교, 이상 탐지를 조합하여 자동 탐지합니다. AI는 기회를 '발견'만 하고, 실행 여부는 구매팀이 결정합니다.
          </div>
        </div>}

      </div>
    </div>
    </div>
  </div>);
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
