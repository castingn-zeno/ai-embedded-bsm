function ContractDetail({ct}){
  var dl=daysLeft(ct.expiry);
  var sc=StatusColor(ct.status);
  var urgent=dl<60;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {/* Header */}
      <div style={{padding:14,borderRadius:C.r.md,background:sc.bg,border:"2px solid "+sc.ac}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:sc.fg}}>{ct.name}</div>
            <div style={{fontSize:12,color:sc.fg,marginTop:2}}>{ct.id+" · "+ct.vendor+" · "+ct.type}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:18,fontWeight:700,color:C.brand}}>{ct.amount}</div>
            <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:9999,color:sc.fg,background:sc.bg,border:"1px solid "+sc.ac}}>{ct.status}</span>
          </div>
        </div>
      </div>

      {/* 기본 정보 + 만료 */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div style={{padding:12,borderRadius:C.r.md,background:C.bg,border:"1px solid "+C.bl}}>
          <div style={{fontSize:12,fontWeight:600,color:C.t1,marginBottom:8}}>계약 정보</div>
          <div style={{fontSize:12,color:C.t2,lineHeight:2}}>
            <div>{"업체: "+ct.vendor}</div>
            <div>{"유형: "+ct.type+" · "+ct.category}</div>
            <div>{"기간: "+ct.start+" ~ "+ct.expiry}</div>
            <div>{"담당: "+ct.manager}</div>
          </div>
        </div>
        <div style={{padding:12,borderRadius:C.r.md,background:urgent?"#FEF2F2":dl<120?"#FFFBEB":"#F0FDF4",border:"1px solid "+(urgent?"#FCA5A5":dl<120?"#FCD34D":"#86EFAC")}}>
          <div style={{fontSize:12,fontWeight:600,color:urgent?"#991B1B":dl<120?"#92400E":"#166534",marginBottom:8}}>만료까지</div>
          <div style={{fontSize:32,fontWeight:700,color:urgent?"#991B1B":dl<120?"#92400E":"#166534",textAlign:"center"}}>{dl+"일"}</div>
          <div style={{fontSize:11,color:urgent?"#991B1B":dl<120?"#92400E":"#166534",textAlign:"center",marginTop:4}}>
            {urgent?"만료 임박 — 즉시 조치 필요":dl<120?"갱신 검토 시기":"여유 있음"}
          </div>
        </div>
      </div>

      {/* SLA */}
      <div style={{padding:12,borderRadius:C.r.md,background:C.bg,border:"1px solid "+C.bl}}>
        <div style={{fontSize:12,fontWeight:600,color:C.t1,marginBottom:8}}>SLA 이행 현황</div>
        {ct.sla.map(function(s,i){return(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:i<ct.sla.length-1?"1px solid "+C.bl:"none"}}>
            <div style={{width:20,height:20,borderRadius:10,background:s.ok?"#22C55E":"#EF4444",color:"#FFF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>{s.ok?"✓":"!"}</div>
            <span style={{flex:1,fontSize:12,color:C.t1}}>{s.name}</span>
            <span style={{fontSize:11,color:C.t3}}>{"목표: "+s.target}</span>
            <span style={{fontSize:12,fontWeight:600,color:s.ok?"#166534":"#991B1B"}}>{s.actual}</span>
          </div>
        );})}
        {ct.sla.some(function(s){return !s.ok;})&&
          <div style={{marginTop:8,padding:"6px 10px",borderRadius:C.r.sm,background:"#FEF2F2",border:"1px solid #FCA5A5",fontSize:11,color:"#991B1B"}}>
            {"SLA 미달 "+ct.sla.filter(function(s){return !s.ok;}).length+"건 — 업체 성과 미팅 또는 크레딧 청구 검토"}
          </div>}
      </div>

      {/* §3.2.2 조항 검증 (T11+T12) */}
      {ct.clauseCheck&&<div style={{padding:12,borderRadius:C.r.md,background:C.bg,border:"1px solid "+C.bl}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:12,fontWeight:600,color:C.t1}}>조항 검증</span>
            <span style={{fontSize:10,color:C.t3}}>{ct.clauseCheck.engine}</span>
          </div>
          <span style={{fontSize:10,color:C.t3}}>{"검증일: "+ct.clauseCheck.checkedAt}</span>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <div style={{flex:1,padding:"6px 10px",borderRadius:C.r.sm,background:"#F0FDF4",border:"1px solid #86EFAC",textAlign:"center"}}>
            <div style={{fontSize:16,fontWeight:700,color:"#166534"}}>{ct.clauseCheck.passed}</div>
            <div style={{fontSize:10,color:"#166534"}}>적합</div>
          </div>
          <div style={{flex:1,padding:"6px 10px",borderRadius:C.r.sm,background:ct.clauseCheck.failed>0?"#FEF2F2":"#F8FAFC",border:"1px solid "+(ct.clauseCheck.failed>0?"#FCA5A5":"#E2E8F0"),textAlign:"center"}}>
            <div style={{fontSize:16,fontWeight:700,color:ct.clauseCheck.failed>0?"#991B1B":"#94A3B8"}}>{ct.clauseCheck.failed}</div>
            <div style={{fontSize:10,color:ct.clauseCheck.failed>0?"#991B1B":"#94A3B8"}}>부적합</div>
          </div>
          <div style={{flex:1,padding:"6px 10px",borderRadius:C.r.sm,background:"#F8FAFC",border:"1px solid #E2E8F0",textAlign:"center"}}>
            <div style={{fontSize:16,fontWeight:700,color:C.t1}}>{ct.clauseCheck.totalClauses}</div>
            <div style={{fontSize:10,color:C.t3}}>총 조항</div>
          </div>
        </div>
        {ct.clauseCheck.items.length>0&&ct.clauseCheck.items.map(function(ci,idx){return(
          <div key={idx} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0",fontSize:11}}>
            <div style={{width:14,height:14,borderRadius:7,background:ci.ok?"#22C55E":"#EF4444",color:"#FFF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,flexShrink:0}}>{ci.ok?"✓":"!"}</div>
            <span style={{color:ci.ok?C.t2:"#991B1B"}}>{ci.name}</span>
          </div>
        );})}
      </div>}

      {/* §3.2.4 변경 이력 */}
      {ct.changes.length>0&&<div style={{padding:12,borderRadius:C.r.md,background:C.bg,border:"1px solid "+C.bl}}>
        <div style={{fontSize:12,fontWeight:600,color:C.t1,marginBottom:8}}>{"변경 이력 ("+ct.changes.length+"건)"}</div>
        {ct.changes.map(function(ch,ci){return(
          <div key={ci} style={{display:"flex",gap:8,padding:"6px 0",borderBottom:ci<ct.changes.length-1?"1px solid "+C.bl:"none",fontSize:11,alignItems:"flex-start"}}>
            <span style={{color:C.t3,flexShrink:0,width:70}}>{ch.date}</span>
            <span style={{fontWeight:600,padding:"1px 6px",borderRadius:9999,color:"#92400E",background:"#FFFBEB",border:"1px solid #FCD34D",flexShrink:0}}>{ch.type}</span>
            <span style={{color:C.t2,flex:1}}>{ch.desc}</span>
            <span style={{color:C.t3,flexShrink:0}}>{ch.actor}</span>
          </div>
        );})}
      </div>}

      {/* §6 Contract Governance Signal */}
      {ct.signals.length>0&&<div style={{padding:12,borderRadius:C.r.md,background:"#FFFBEB",border:"1px solid #FCD34D"}}>
        <div style={{fontSize:12,fontWeight:600,color:"#92400E",marginBottom:6}}>{"Contract Governance Signal ("+ct.signals.length+"건)"}</div>
        {ct.signals.map(function(sig,si){return(
          <div key={si} style={{display:"flex",gap:8,padding:"6px 0",borderBottom:si<ct.signals.length-1?"1px solid #FCD34D":"none",fontSize:11,alignItems:"flex-start"}}>
            <span style={{fontWeight:600,padding:"1px 6px",borderRadius:9999,color:"#92400E",background:"#FFFBEB",border:"1px solid #F59E0B",flexShrink:0}}>{sig.type}</span>
            <span style={{color:"#92400E",flex:1}}>{sig.msg}</span>
            <span style={{fontSize:10,color:C.t3,flexShrink:0}}>{sig.engine}</span>
          </div>
        );})}
      </div>}

      {/* 갱신 액션 */}
      {ct.renewalAction&&
        <div style={{padding:12,borderRadius:C.r.md,background:"#FFFBEB",border:"1px solid #FCD34D"}}>
          <div style={{fontSize:12,fontWeight:600,color:"#92400E",marginBottom:4}}>갱신/조치 필요</div>
          <div style={{fontSize:12,color:"#92400E"}}>{ct.renewalAction}</div>
        </div>}

      {/* Actions */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        <button style={{padding:"8px 14px",borderRadius:C.r.md,border:"1px solid "+C.bm,background:C.white,fontSize:12,color:C.t2}}>계약서 조회</button>
        <button style={{padding:"8px 14px",borderRadius:C.r.md,border:"1px solid "+C.bm,background:C.white,fontSize:12,color:C.t2}}>성과 리포트</button>
        {dl<120&&<button style={{padding:"8px 14px",borderRadius:C.r.md,border:"none",background:"#F59E0B",fontSize:12,color:"#FFF",fontWeight:600}}>갱신 프로세스 시작</button>}
        {ct.sla.some(function(s){return !s.ok;})&&
          <button style={{padding:"8px 14px",borderRadius:C.r.md,border:"none",background:"#EF4444",fontSize:12,color:"#FFF",fontWeight:600}}>SLA 위반 조치</button>}
      </div>

      <div style={{padding:8,borderRadius:C.r.sm,background:"#F0F4FF",border:"1px solid #BFDBFE",fontSize:10,color:"#1E40AF",lineHeight:1.5}}>
        <span>{"T11 Legal Clause Tracker + T12 Clause Assembly Checker가 계약 조항을 자동 검증합니다. T14 Ethical Compliance가 ESG 조항을 확인합니다."}</span>
      </div>
    </div>
  );
}

  var[sel,setSel]=useState(null);
  var[filter,setFilter]=useState("all");

  var filtered=CONTRACTS.filter(function(ct){
    if(filter==="all")return true;
    if(filter==="expiring")return daysLeft(ct.expiry)<120;
    if(filter==="sla_issue")return ct.sla.some(function(s){return !s.ok;});
    if(filter==="signals")return ct.signals.length>0;
    return ct.type===filter;
  });

  return(
  <div style={{width:"100%",height:"100%",background:"#E8ECF1",display:"flex",flexDirection:"column",fontFamily:"'Pretendard Variable',Pretendard,-apple-system,sans-serif",overflow:"hidden"}}>
    <style>{`@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.css');*{box-sizing:border-box;margin:0;padding:0}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#E2E8F0;border-radius:3px}button{cursor:pointer;font-family:inherit;transition:all .15s}button:hover:not(:disabled){filter:brightness(1.05)}`}</style>

    <div style={{height:28,background:"#2D3748",display:"flex",alignItems:"center",padding:"0 14px",gap:6,flexShrink:0}}>
      <div style={{display:"flex",gap:4}}><div style={{width:8,height:8,borderRadius:4,background:"#FC5C65"}}/><div style={{width:8,height:8,borderRadius:4,background:"#FED330"}}/><div style={{width:8,height:8,borderRadius:4,background:"#26DE81"}}/></div>
      <span style={{color:"#A0AEC0",fontSize:10,fontWeight:500,marginLeft:8}}>AI Embedded BSM PRO — 계약 관리 (CEO §3.2)</span>
    </div>

    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:12,overflow:"hidden"}}>
    <div style={{width:"100%",maxWidth:1060,height:"100%",maxHeight:"88%",display:"flex",flexDirection:"column",borderRadius:C.r.xl,overflow:"hidden",boxShadow:"0 24px 80px rgba(0,0,0,.35)",background:C.white}}>

      {/* Header */}
      <div style={{padding:"10px 20px",background:"linear-gradient(135deg,#1E40AF,#3B82F6)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:8,background:"rgba(255,255,255,.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>📑</div>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontWeight:700,fontSize:16,color:"#FFF"}}>계약 관리</span>
              <span style={{fontSize:11,color:"rgba(255,255,255,.6)"}}>CEO · T11+T12+T14</span>
            </div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.7)"}}>조항 검증 · SLA 모니터링 · 변경 이력 · 갱신 워크플로우</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:9999,color:"#FFF",background:"rgba(255,255,255,.3)"}}>{"만료 임박 "+CONTRACTS.filter(function(c){return daysLeft(c.expiry)<60;}).length}</span>
          <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:9999,color:"#FFF",background:"rgba(255,255,255,.3)"}}>{"SLA 미달 "+CONTRACTS.filter(function(c){return c.sla.some(function(s){return !s.ok;});}).length}</span>
          <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:9999,color:"#FFF",background:"rgba(255,255,255,.3)"}}>{"Signal "+CONTRACTS.filter(function(c){return c.signals.length>0;}).length}</span>
          <span style={{fontSize:10,fontWeight:600,padding:"3px 10px",borderRadius:9999,color:"#FFF",background:"rgba(255,255,255,.2)"}}>PRO</span>
        </div>
      </div>

      {/* Body */}
      <div style={{flex:1,display:"flex",overflow:"hidden",minHeight:0}}>
        {/* Left */}
        <div style={{width:320,borderRight:"1px solid "+C.bl,display:"flex",flexDirection:"column",flexShrink:0}}>
          <div style={{padding:"8px 10px",borderBottom:"1px solid "+C.bl,display:"flex",gap:4,flexWrap:"wrap"}}>
            {[{id:"all",label:"전체"},{id:"expiring",label:"만료 임박"},{id:"sla_issue",label:"SLA 미달"},{id:"signals",label:"Signal"},{id:"서비스",label:"서비스"},{id:"렌탈",label:"렌탈"},{id:"구독",label:"구독"}].map(function(f){
              var ac=filter===f.id;
              return <button key={f.id} onClick={function(){setFilter(f.id);setSel(null);}} style={{padding:"4px 10px",borderRadius:9999,border:ac?"none":"1px solid "+C.bl,background:ac?C.brand:C.white,color:ac?"#FFF":C.t2,fontSize:11,fontWeight:ac?600:400}}>{f.label}</button>;
            })}
          </div>
          <div style={{flex:1,overflowY:"auto"}}>
            {filtered.map(function(ct,i){
              var dl=daysLeft(ct.expiry);
              var scc=StatusColor(ct.status);
              var active=sel===i;
              var slaFail=ct.sla.some(function(s){return !s.ok;});
              return(
                <div key={i} onClick={function(){setSel(i);}} style={{padding:"10px 14px",borderBottom:"1px solid "+C.bl,cursor:"pointer",background:active?scc.bg:C.white,borderLeft:active?"3px solid "+scc.ac:"3px solid transparent"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:12}}>{TYPE_ICON[ct.type]||"📄"}</span>
                      <span style={{fontSize:13,fontWeight:600,color:C.t1}}>{ct.name}</span>
                    </div>
                    <span style={{fontSize:10,fontWeight:600,padding:"2px 6px",borderRadius:9999,color:scc.fg,background:scc.bg}}>{ct.status}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:2}}>
                    <span style={{color:C.t3}}>{ct.vendor}</span>
                    <span style={{fontWeight:600,color:C.brand}}>{ct.amount}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:10}}>
                    <span style={{color:dl<60?"#991B1B":dl<120?"#92400E":C.t3}}>{"만료: "+ct.expiry+" ("+dl+"일)"}</span>
                    <div style={{display:"flex",gap:6}}>
                      {slaFail&&<span style={{color:"#991B1B",fontWeight:600}}>SLA미달</span>}
                      {ct.signals.length>0&&<span style={{color:"#1E40AF",fontWeight:600}}>{"Signal "+ct.signals.length}</span>}
                    </div>
                  </div>
                </div>
              );
            })}
            {filtered.length===0&&<div style={{padding:20,textAlign:"center",color:C.t3,fontSize:12}}>해당 조건의 계약이 없습니다.</div>}
          </div>
        </div>

        {/* Right */}
        <div style={{flex:1,overflowY:"auto",padding:14}}>
          {sel===null&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:C.t3}}>
            <span style={{fontSize:36,marginBottom:12}}>📑</span>
            <span style={{fontSize:14}}>왼쪽에서 계약을 선택해 주세요</span>
          </div>}
          {sel!==null&&filtered[sel]&&<ContractDetail ct={filtered[sel]}/>}
        </div>
      </div>
    </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
