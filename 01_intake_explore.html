var auditTrail=[];
function logEvent(evt){
  var entry={
    event_id:crypto.randomUUID?crypto.randomUUID():("evt-"+Date.now()+"-"+Math.random().toString(36).slice(2,8)),
    screen:"explore",
    timestamp:new Date().toISOString(),
    previous_state:evt.from||null,
    new_state:evt.to||null,
    trigger_source:evt.trigger||"user",
    engine_code:evt.engine||"A01",
    event_type:evt.type||"state_transition",
    payload:evt.payload||null,
  };
  auditTrail.push(entry);
  if(DEV_MODE)console.log("[AUDIT:explore]",entry.event_type,entry.previous_state,"→",entry.new_state,entry.payload?JSON.stringify(entry.payload).slice(0,80):"");
}

function matchCategory(text){
  var t=text.toLowerCase();
  // Step 1: DIRECT_L3_MAP (오분류 방지 — 긴 키 우선)
  var dKeys=Object.keys(DIRECT_L3_MAP).sort(function(a,b){return b.length-a.length;});
  for(var di=0;di<dKeys.length;di++){
    if(t.indexOf(dKeys[di])>=0){
      for(var ci=0;ci<CATEGORIES.length;ci++){
        if(CATEGORIES[ci].l3===DIRECT_L3_MAP[dKeys[di]])return CATEGORIES[ci];
      }
    }
  }
  // Step 2: SYNONYM_REPLACE (줄임말 치환)

}

function extractAmount(text){
  // 금액 추출: "5천만원", "2억", "500만원", "8,000,000원" 등
  var t=text.replace(/,/g,"");
  var m;
  m=t.match(/(\d+(?:\.\d+)?)\s*억/);if(m)return parseFloat(m[1])*100000000;
  m=t.match(/(\d+(?:\.\d+)?)\s*천만/);if(m)return parseFloat(m[1])*10000000;
  m=t.match(/(\d+(?:\.\d+)?)\s*백만/);if(m)return parseFloat(m[1])*1000000;
  m=t.match(/(\d+(?:\.\d+)?)\s*만/);if(m)return parseFloat(m[1])*10000;
  m=t.match(/(\d{6,})\s*원/);if(m)return parseInt(m[1]);
  return null;
}

function buildCondition(text,cat){
  var t=text.toLowerCase();
  var con={
    contract:null,       // Contract Flag (§5.1 가중치 0.15)
    urgency:false,       // Urgency Level (§5.1 가중치 0.10)
    amount:null,         // Amount Bucket (§5.1 가중치 0.20)
    amountBucket:null,   // "micro"|"small"|"medium"|"large"|"strategic"
    reorder:false,       // Reorder pattern
    renewal:false,       // Renewal signal
    soleSource:false,    // Sole supplier
    capex:false,         // CAPEX/Asset
    specialApproval:false,// Special approval
    supplierMentioned:false,// Supplier Preference (§5.1 가중치 0.10)
  };

  // 계약 조회
  if(cat&&CONTRACT_DB[cat.l3])con.contract=CONTRACT_DB[cat.l3];

  // 긴급성
  for(let i=0;i<URGENCY_KW.length;i++){if(t.indexOf(URGENCY_KW[i])>=0){con.urgency=true;break;}}

  // 재주문/갱신
  for(let i=0;i<REORDER_KW.length;i++){if(t.indexOf(REORDER_KW[i])>=0){con.reorder=true;break;}}
  for(let i=0;i<RENEWAL_KW.length;i++){if(t.indexOf(RENEWAL_KW[i])>=0){con.renewal=true;break;}}

  // 단일 공급사
  for(let i=0;i<SOLE_SOURCE_KW.length;i++){if(t.indexOf(SOLE_SOURCE_KW[i])>=0){con.soleSource=true;break;}}

  // CAPEX
  for(let i=0;i<CAPEX_KW.length;i++){if(t.indexOf(CAPEX_KW[i])>=0){con.capex=true;break;}}
  if(cat&&cat.cluster==="capex")con.capex=true;

  // 특별 승인
  for(let i=0;i<SPECIAL_APPROVAL_KW.length;i++){if(t.indexOf(SPECIAL_APPROVAL_KW[i])>=0){con.specialApproval=true;break;}}

  // 금액
  con.amount=extractAmount(text);
  if(con.amount!==null){
    if(con.amount<=1000000)con.amountBucket="micro";
    else if(con.amount<=50000000)con.amountBucket="small";
    else if(con.amount<=200000000)con.amountBucket="medium";
    else con.amountBucket="strategic";
  }

  // 고액 키워드 (금액 미명시)
  if(con.amount===null&&(t.indexOf("억")>=0||t.indexOf("대형")>=0||t.indexOf("전사")>=0)){
    con.amountBucket="strategic";
  }

  // 공급사 언급 여부
  if(con.contract)con.supplierMentioned=true;
  var supplierKW=["삼성","LG","코웨이","세스코","신도리코","네스프레소","ISS","KT","AWS","Microsoft","OpenAI","롯데"];
  for(let i=0;i<supplierKW.length;i++){if(t.indexOf(supplierKW[i].toLowerCase())>=0){con.supplierMentioned=true;break;}}

  return con;
}

    if(con.amountBucket==="strategic")return{gtCode:"G34",candidates:["G34","G33"],reason:"고액 자산/설비 → 전략 구매"};
    if(con.amountBucket==="medium")return{gtCode:"G33",candidates:["G33","G11"],reason:"자산/설비 → 투자 심의 필요"};
    return{gtCode:"G33",candidates:["G33","G34"],reason:"자산/설비 → 자산 구매 절차"};
  }

  // 카탈로그 (금액 미명시)
  if(cat.cluster==="catalog")
    return{gtCode:"G01",candidates:["G01","G02"],reason:"카탈로그 등록 품목"};

  // ── SW11: 신규 cluster GT 매핑 (Wave 2) ──

  // 물류 — 26개 L3
  if(cat.cluster==="logistics"){
    if(con.contract)return{gtCode:"G18",candidates:["G18","G17"],reason:"물류 서비스 — 기존 계약 활용"};
    if(con.amountBucket==="strategic")return{gtCode:"G13",candidates:["G13","G25"],reason:"대형 물류 → 전략 경쟁 입찰"};
    if(con.amountBucket==="medium")return{gtCode:"G11",candidates:["G11","G21"],reason:"물류 서비스 → 업체 비교 견적"};
    return{gtCode:"G21",candidates:["G21","G11"],reason:"물류 서비스 구매"};
  }

  // 연구개발 — 13개 L3
  if(cat.cluster==="rnd"){
    if(con.amountBucket==="strategic")return{gtCode:"G25",candidates:["G25","G13"],reason:"대형 R&D → 프로젝트 서비스"};
    if(con.amountBucket==="medium")return{gtCode:"G24",candidates:["G24","G11"],reason:"R&D 용역/인증 → 전문 서비스"};
    return{gtCode:"G24",candidates:["G24","G21"],reason:"연구개발 서비스/인증"};
  }

  // 마케팅 — 21개 L3
  if(cat.cluster==="marketing"){
    if(con.contract)return{gtCode:"G18",candidates:["G18","G21"],reason:"마케팅 서비스 — 기존 계약"};
    if(con.amountBucket==="strategic")return{gtCode:"G13",candidates:["G13","G25"],reason:"대형 마케팅 → 전략 경쟁"};
    if(con.amountBucket==="medium")return{gtCode:"G11",candidates:["G11","G21"],reason:"마케팅 서비스 → 업체 비교"};
    if(con.amountBucket==="micro")return{gtCode:"G10",candidates:["G10","G21"],reason:"소액 마케팅 → 간소화 처리"};
    return{gtCode:"G21",candidates:["G21","G11"],reason:"마케팅 서비스 구매"};
  }

  // 보험 — 9개 L3
  if(cat.cluster==="insurance"){
    if(con.contract)return{gtCode:"G18",candidates:["G18","G17"],reason:"보험 계약 갱신/변경"};
    if(con.renewal)return{gtCode:"G17",candidates:["G17","G18"],reason:"보험 계약 갱신"};
    return{gtCode:"G24",candidates:["G24","G11"],reason:"보험 → 전문 서비스 비교"};
  }

  // ── §4.5 Default Fallback → G06 ──
  return{gtCode:"G06",candidates:["G06"],reason:"일반 구매요청서 작성"};
}


// ── Phase 5: Confidence Score (§5.1 — Signal Completeness) ──
// SW17: 금액 미입력 + 금액 의존 GT → Confidence 캡 적용
var AMOUNT_SENSITIVE_GTS=["G06","G07","G08","G10","G11","G12","G13","G26","G33","G34"];
function calcConfidence(cat,con,gtResult){
  var score=0;
  // 1. Category L3 Code (0.25)
  if(cat)score+=0.25;
  // 2. Amount Bucket (0.20)
  if(con.amountBucket!==null)score+=0.20;
  else if(cat&&(cat.cluster==="catalog"||cat.cluster==="contact"))score+=0.15; // 소액 추정
  // 3. Contract Flag (0.15)
  if(con.contract)score+=0.15;
  else if(cat)score+=0.10; // 조회 완료, 계약 없음 확인
  // 4. Urgency Level (0.10)
  if(con.urgency)score+=0.10;
  else score+=0.08; // 비긴급 확인
  // 5. Supplier Preference (0.10)
  if(con.supplierMentioned)score+=0.10;
  else score+=0.05; // 미지정 확인
  // 6. History Match (0.10) — MVP에서 간이 추정
  if(con.reorder||con.renewal)score+=0.10;
  else if(con.contract)score+=0.07; // 계약 있으면 이력 존재 추정
  // 7. GT Candidate Uniqueness (0.10)
  if(gtResult.candidates.length===1)score+=0.10;
  else if(gtResult.candidates.length===2)score+=0.05;
  // else 0

  var raw=Math.min(Math.round(score*100)/100, 1.00);

  // SW17: 금액 미입력 + 금액 의존 GT → 캡 0.55 (clarify 분기로 강제)
  // 이유: 같은 품목도 금액에 따라 G06(PR)↔G10(소액)↔G11(RFQ)↔G33(CAPEX)이 완전히 달라짐
  if(con.amountBucket===null&&gtResult.gtCode&&AMOUNT_SENSITIVE_GTS.indexOf(gtResult.gtCode)>=0){
    raw=Math.min(raw,0.55);
  }

  return raw;
}


// ── GT → UX Group 매핑 ──
function gtToUxGroup(gtCode){
  if(gtCode==="CONTACT")return "contact_only";
  var gt=GT_REGISTRY[gtCode];
  if(gt)return gt.uxGroup;
  return "general_pr";
}

function getIntakeConfig(gtCode){return GT_INTAKE_CONFIG[gtCode]||{depth:2,maxTurns:5,ask:["사양","수량","납기","예산"],desc:"구매요청"};}

function navigate(text){
  var cat=matchCategory(text);
  if(!cat)return{resolved:false,phase:"category_miss"};
  var con=buildCondition(text,cat);

  // CANON lookup
  var canon=L3_GT_CANON[cat.l3];
  var btCode,gt,reason,candidates;
  if(canon){
    btCode=canon.bt;gt=canon.gt;reason="품목 확인 완료";candidates=[gt];
    if(con.urgency){btCode="BT-K";gt="G31";reason="긴급 구매";candidates=["G31"];}
    else if(con.soleSource){gt="G32";reason="단일 공급사";candidates=["G32"];}
    else if(con.specialApproval){gt="G35";reason="특별 승인";candidates=["G35"];}
  }else{
    btCode=resolveBT(cat.l3,con.urgency);
    var intent=stabilizeIntent(cat,con);
    var gtResult=resolveGT(cat,con,intent);
    if(!gtResult.gtCode)return{resolved:false,phase:"gt_miss",category:cat};
    gt=gtResult.gtCode;reason=gtResult.reason+" (fallback)";candidates=gtResult.candidates;
    if(con.urgency)btCode="BT-K";
  }
  var bt=BT_META[btCode]||BT_META["BT-E"];
  var gtInfo=(gt!=="CONTACT"&&GT_REGISTRY[gt])?GT_REGISTRY[gt]:null;
  var confidence=canon?0.85:0.50;
  if(con.contract)confidence+=0.10;
  if(con.urgency||con.soleSource||con.specialApproval)confidence+=0.05;
  confidence=Math.min(Math.round(confidence*100)/100,1.00);
  if(cat.cluster==="contact"){gt="CONTACT";candidates=["CONTACT"];gtInfo=null;}
  var uxGroupKey=gtToUxGroup(gt);
  if(bt.prAllowed===false&&btCode!=="BT-A"&&uxGroupKey!=="contact_only")uxGroupKey="dept_request";
  var uxGroup=UX_GROUPS[uxGroupKey]||UX_GROUPS.general_pr;
  var l3msg=L3_MSG[cat.l3]||null;
  return{
    resolved:true,category:cat,condition:con,intent:con.urgency?"EMERGENCY":"CANONICAL",
    btCode:btCode,bt:bt,gtCode:gt,gtInfo:gtInfo,candidates:candidates,reason:reason,
    confidence:confidence,contract:con.contract,uxGroupKey:uxGroupKey,guide:uxGroup,
    l3msg:l3msg,canonical:!!canon,
  };
}


/* ═══════════════════════════════════════════════════════════════
   Policy Filters — Blocked / Special Route
   ═══════════════════════════════════════════════════════════════ */
var BLOCKED=[
  // SW05: "술"은 2글자 미만 → "기술","미술","법술" 오탐 → 제거하고 구체적 키워드만 유지
  {kw:["주류","맥주","소주","와인","위스키","양주","보드카"],reason:"주류는 구매 시스템에서 처리할 수 없습니다.",policy:"구매정책 §3.1",except:["주류검사","주류분석","주류관리"]},
  {kw:["담배","전자담배","궐련"],reason:"담배류는 구매 불가 품목입니다.",policy:"구매정책 §3.2"},
  {kw:["현금","현금성","캐시백"],reason:"현금성 자산은 구매 시스템 대상이 아닙니다.",policy:"구매정책 §4.2",except:["현금흐름","현금관리시스템"]},
  {kw:["개인용","사적용도","사적구매"],reason:"개인 용도 구매는 처리할 수 없습니다.",policy:"구매정책 §1.1",except:["개인정보","개인보호","개인보호장비"]},
  {kw:["무기","총기","폭발물","화약"],reason:"위험물품은 구매 불가입니다.",policy:"구매정책 §3.3",except:["무기체계분석","무기질"]},
  {kw:["가상화폐","비트코인","코인","NFT"],reason:"가상자산은 구매 대상이 아닙니다.",policy:"구매정책 §4.3",except:["코인세탁","코인주차","코인로커","코인워시","스타벅스코인"]},
  {kw:["주식매매","펀드투자","투자상품","채권매입"],reason:"금융투자 상품은 구매 시스템 대상이 아닙니다.",policy:"재무정책 §2.1",except:["투자계획서","투자검토"]},
];
function checkBlocked(text){
  var t=text.toLowerCase();
  for(let i=0;i<BLOCKED.length;i++){
    var b=BLOCKED[i];
    var matched=false;
    for(let j=0;j<b.kw.length;j++){
      var kw=b.kw[j];
      // SW05: 3글자 이하 키워드는 앞뒤가 공백/시작/끝/조사인지 체크 (부분문자열 오탐 방지)
      if(kw.length<=3){
        // 앞뒤 경계 체크: 키워드가 다른 단어의 일부인지 확인
        var idx=t.indexOf(kw);
        while(idx>=0){
          var before=idx===0||/[\s,.()\[\]{}·:;!?\/]/.test(t[idx-1]);
          var after=idx+kw.length>=t.length||/[\s,.()\[\]{}·:;!?\/를을이가은는도에서]/.test(t[idx+kw.length]);
          if(before&&after){matched=true;break;}
          idx=t.indexOf(kw,idx+1);
        }
      }else{
        if(t.indexOf(kw)>=0){matched=true;}
      }
      if(matched)break;
    }
    if(!matched)continue;
    // 예외 키워드 체크 — 오탐 방지
    if(b.except){let excepted=false;for(let e=0;e<b.except.length;e++){if(t.indexOf(b.except[e])>=0){excepted=true;break;}}if(excepted)continue;}
    return b;
  }
  return null;
}

  function safeTimeout(fn, ms){
    var id=setTimeout(function(){
      timersRef.current=timersRef.current.filter(function(t){return t!==id;});
      fn();
    }, ms);
    timersRef.current.push(id);
    return id;
  }
  // SW02: 모든 활성 타이머 제거
  function clearAllTimers(){

              {navResult&&navResult.l3msg?(

              if(ic.depth===1){
                var btnLabel=dept?"BSM "+dept+" 신청서 작성":"BSM 신청서 작성";
                return <button onClick={function(){logExecution("BSM_FORM_NAVIGATE",navResult);setFormDone(true);var cm=dept?dept+" 신청서로 이동합니다.":"BSM 신청서로 이동합니다.";if(navResult&&navResult.contract)cm+="\n계약: "+navResult.contract.contract+" ("+navResult.contract.vendor+")";setMsgs(function(p){return p.concat([{role:"ai",content:cm,done:true}]);});}} style={{width:"100%",padding:"13px 14px",borderRadius:T.radius.md,border:"none",background:gc.accent,color:"#FFF",fontSize:14,fontWeight:600,cursor:"pointer"}}>{btnLabel}</button>;
              }else{
                var askPreview=ic.ask.slice(0,2).join(", ");
                return <button onClick={function(){logExecution("GOTO_REQUIREMENT",navResult);setFormDone(true);setMsgs(function(p){return p.concat([{role:"ai",content:"요건 정리 화면으로 이동합니다.\n"+askPreview+" 등을 확인할게요.",done:true,nextScreen:"requirement"}]);});}} style={{width:"100%",padding:"13px 14px",borderRadius:T.radius.md,border:"none",background:gc.accent,color:"#FFF",fontSize:14,fontWeight:600,cursor:"pointer"}}>요건 정리 시작 →</button>;
              }
            })()}

            {/* 연락처 안내 */}
            {guide.contacts&&guide.contacts.filter(function(ct){return !navResult||!navResult.category||ct.l3===navResult.category.l3;}).map(function(ct,ci){return(
              <div key={ci} style={{padding:14,borderRadius:T.radius.md,background:gc.bg,border:"2px solid "+gc.accent}}>
                <div style={{fontSize:14,fontWeight:700,color:gc.fg,marginBottom:8}}>{ct.name}</div>
                <div style={{fontSize:13,color:T.text.primary,marginBottom:4}}>업체: {ct.vendor}</div>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",borderRadius:T.radius.md,background:T.surface,border:"1px solid "+gc.border,marginBottom:8}}>
                  <span style={{fontSize:20}}>📞</span>
                  <span style={{fontSize:18,fontWeight:700,color:gc.fg,letterSpacing:0.5}}>{ct.phone}</span>
                </div>
                <div style={{fontSize:12,color:T.text.secondary,lineHeight:1.6}}>{ct.note}</div>
              </div>
            );})}


            {formDone&&(
              <div style={{padding:12,borderRadius:T.radius.md,background:T.state.complete.bg,border:"1px solid "+T.state.complete.border,fontSize:13,color:T.state.complete.fg,lineHeight:1.6}}>
                ✅ 제출 완료!<br/>담당자에게 전달되었습니다.
                <div style={{marginTop:8,padding:"8px 10px",borderRadius:T.radius.sm,background:"rgba(22,101,52,0.08)",fontSize:11,color:T.text.secondary,lineHeight:1.5}}>
                  💡 AI가 작성한 초안이며, 전달 전 검토·수정이 가능합니다.<br/>추적번호가 이메일로 발송됩니다.
                </div>
              </div>
            )}

            {/* 담당자 */}
            {guide.id!=="catalog"&&guide.id!=="contact_only"&&(
              <div style={{padding:"8px 10px",borderRadius:T.radius.md,border:"1px solid "+T.border.light,background:T.surfAlt}}>
                <div style={{fontSize:13,fontWeight:600,color:T.text.primary}}>{BUYER.name}</div>
                <div style={{fontSize:11,color:T.text.secondary}}>{BUYER.dept} · 내선 {BUYER.ext}</div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
    </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
