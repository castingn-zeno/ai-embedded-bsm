                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:10,fontWeight:600,padding:"2px 6px",borderRadius:9999,color:gc.fg,background:gc.bg}}>{s.grade}</span>
                    <span style={{fontSize:14,fontWeight:700,color:gc.fg}}>{s.score}</span>
                  </div>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
                  <span style={{color:C.t3}}>{s.cat}</span>
                  <span style={{color:s.risk==="낮음"?"#166534":s.risk==="보통"?"#92400E":"#991B1B"}}>{"리스크: "+s.risk}</span>
                </div>
                {(s.issues.length>0||s.signals.length>0)&&<div style={{display:"flex",gap:8,marginTop:3,fontSize:10}}>
                  {s.issues.length>0&&<span style={{color:"#92400E"}}>{"이슈 "+s.issues.length}</span>}
                  {s.signals.length>0&&<span style={{color:"#1E40AF"}}>{"신호 "+s.signals.length}</span>}
                </div>}
              </div>
            );})}
          </div>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:14}}>
          {sel===null&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:C.t3}}>
            <span style={{fontSize:36,marginBottom:12}}>🏢</span>
            <span style={{fontSize:14}}>왼쪽에서 공급사를 선택해 주세요</span>
          </div>}
          {sel!==null&&<Detail s={SUPPLIERS[sel]}/>}
        </div>
      </div>
    </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
