// Data Requirement Dictionary v2.0 §11 — GT별 데이터 수준
const DATA_REQ_LEVEL={
  catalog:{fields:["item","qty"],label:"Core Identification 최소"},
  standard:{fields:["item","qty","budget","spec"],label:"Core + Financial"},
  rfq:{fields:["item","qty","budget","spec","evalCriteria"],label:"Core + Financial + Supplier Routing + Governance"},
  strategic:{fields:["item","qty","budget","spec","evalCriteria","purpose","period"],label:"전체 Data Requirement 그룹"},
};
function getDataLevel(gtCode){
  const route=GT_ROUTE[gtCode];
  if(route==="B")return DATA_REQ_LEVEL.standard;
  if(route==="C")return DATA_REQ_LEVEL.standard;
  if(["G13","G14","G15","G33","G34"].includes(gtCode))return DATA_REQ_LEVEL.strategic;
  if(route==="D")return DATA_REQ_LEVEL.rfq;
  return DATA_REQ_LEVEL.standard;
}


/* ═══════════════════════════════════════════════════════════════
   Readiness Validation Engine
   ═══════════════════════════════════════════════════════════════ */
const BJ_STEP_LABELS={
  a05:"공급사 리스크 스캔",a06:"경쟁 구조 정렬",a07:"비용 안정성 점검",
  a08:"정책 준수 확인",a09:"경쟁 평가/선정",a10:"계약 구조 설계",
  a11:"승인 흐름 실행",a12:"예산 안정성 확인",a13:"의사결정 안정성 검증",
};

function readinessValidate(sc){
  const checks=[];
  const dataLevel=getDataLevel(sc.gtCode);
  const docs=GT_DOCS[sc.gtCode]||[];

  // 1. 필수 필드 누락 검사 (GT별 Data Requirement 수준)
  dataLevel.fields.forEach(k=>{
    const labels={item:"품목명",qty:"수량",budget:"예산",spec:"사양/범위",evalCriteria:"평가 기준",purpose:"구매 목적",period:"기간"};
    const has=!!sc.req[k];
    checks.push({id:"FLD-"+k,cat:"필수 정보 ("+dataLevel.label+")",label:labels[k]||k,ok:has,severity:has?"pass":k==="spec"||k==="evalCriteria"?"warn":"fail",fix:has?null:(labels[k]||k)+" 입력 필요"});
  });

  // 2. 첨부문서 검증 (GT_DOCS 기준)
  if(docs.length>0){
    docs.forEach(d=>{
      const has=sc.attachments&&sc.attachments[d.id];
      checks.push({id:"DOC-"+d.id,cat:"첨부문서",label:d.label+(d.required?" (필수)":" (선택)"),ok:!!has||!d.required,severity:has?"pass":d.required?"fail":"warn",fix:has?null:d.label+" 등록 필요"});
    });
  }

  // 3. 정책 정합 검사
  checks.push({id:"POL-APPROVAL",cat:"정책 정합",label:"승인 경로 정합성",ok:true,severity:"pass",fix:null});
  if(sc.cond?.needsRfq&&!sc.cond?.hasExistingContract){
    checks.push({id:"POL-RFQ",cat:"정책 정합",label:"경쟁 견적 요건 확인",ok:true,severity:"pass",fix:null});
  }
  // 경로 B: 계약 범위 내 확인
  if(sc.route==="B"){
    checks.push({id:"POL-CONTRACT",cat:"정책 정합",label:"기존 계약 범위 내 확인",ok:true,severity:"pass",fix:null});
    checks.push({id:"POL-COND-SKIP",cat:"정책 정합",label:"조건 점검 건너뜀 (계약 내재)",ok:true,severity:"pass",fix:null});
  }

  // 4. 예산 검사
  checks.push({id:"BDG-001",cat:"예산 확인",label:"부서 예산 잔액 확인",ok:true,severity:"pass",fix:null});
  if(sc.amountNum>5000){
    checks.push({id:"BDG-002",cat:"예산 확인",label:"CAPEX 투자 예산 확인",ok:sc.amountNum<=20000,severity:sc.amountNum<=20000?"pass":"warn",fix:sc.amountNum>20000?"추경 예산 편성 필요":null});
  }

  // 5. 공급사
  checks.push({id:"SUP-001",cat:"공급사",label:"적합 공급사 Pool 존재",ok:true,severity:"pass",fix:null});

  const failCount=checks.filter(c=>c.severity==="fail").length;
  const warnCount=checks.filter(c=>c.severity==="warn").length;
  const passCount=checks.filter(c=>c.severity==="pass").length;
  const canProceed=failCount===0;

  // BJ 경로
  let bjSteps=["a05","a08","a11"];
  if(sc.route==="B")bjSteps=["a08","a11"]; // 계약 발주: 간소
  else if(sc.cond?.isStrategic||sc.route==="D")bjSteps=["a05","a06","a07","a09","a08","a12","a13","a10","a11"];
  else if(sc.cond?.needsRfq)bjSteps=["a05","a06","a07","a09","a08","a10","a11"];

  const estDays=sc.route==="B"?2:sc.cond?.isStrategic?21:sc.cond?.needsRfq?10:3;

  return {checks,failCount,warnCount,passCount,canProceed,bjSteps,estDays,
    gt:sc.gt,confidence:sc.confidence,dataLevel,docsCount:docs.length};
}

  {id:"v-copier",label:"복합기 렌탈 추가 (₩8만)",route:"B",gtCode:"G19",btCode:"BT-B",
    req:{item:"신도리코 복합기",qty:"1",qtyUnit:"대",budget:"8",spec:"컬러 A3",actionType:"추가 설치",detail:"5층 회의실"},
    cond:null,attachments:{},
    amountNum:8,gt:{code:"G19",name:"렌탈/리스 신청"},confidence:0.95,
    approvalPath:"자동 승인",policySignals:0},
];

function App(){
  const[started,setStarted]=useState(false);
  const[msgs,setMsgs]=useState([]);
  const[busy,setBusy]=useState(false);
  const[result,setResult]=useState(null);
  const[confirmed,setConfirmed]=useState(false);
  const[state5,setState5]=useState("READY");
  const[scenario,setScenario]=useState(null);
  // 임시저장 (v7.2 동기화)
  const[draftStatus,setDraftStatus]=useState(null);
  const[draftTs,setDraftTs]=useState(null);
  const ref=useRef(null);
  const draftTimerRef=useRef(null);
  useEffect(()=>{ref.current?.scrollTo({top:ref.current.scrollHeight,behavior:"smooth"});},[msgs]);

  // 자동 임시저장 — result 변경 시 3초 후 저장
  useEffect(()=>{
    if(!result)return;
    if(draftTimerRef.current)clearTimeout(draftTimerRef.current);
    draftTimerRef.current=setTimeout(()=>saveDraft(),3000);
    return ()=>{if(draftTimerRef.current)clearTimeout(draftTimerRef.current);};
  },[result,confirmed]);

  function saveDraft(){
    setDraftStatus("saving");
    setTimeout(()=>{
      setDraftStatus("saved");setDraftTs(new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}));
      setTimeout(()=>setDraftStatus(null),2000);
    },300);
  }

  function resetAll(){setStarted(false);setMsgs([]);setBusy(false);setResult(null);setConfirmed(false);setState5("READY");setScenario(null);setDraftStatus(null);setDraftTs(null);}

  const pick=(sc)=>{
    const route=GT_ROUTE[sc.gtCode];
    if(route==="A"){alert("이 GT("+sc.gtCode+")은 Explore에서 완결됩니다. 12에 진입 불가.");return;}
    setScenario(sc);setStarted(true);setState5("IN_PROGRESS");
    logEvent({type:"VALIDATION_START",from:"READY",to:"IN_PROGRESS",trigger:"user",engine:"VLD",payload:{gtCode:sc.gtCode,route:sc.route}});
    var catLabel=sc.label||"";
    setMsgs([{r:"sys",c:catLabel+" 요건이 도착했어요.\n실행 전 최종 검증을 시작합니다."}]);
    setTimeout(()=>runValidation(sc),1000);
  };

  const runValidation=(sc)=>{
    setBusy(true);
    setMsgs(p=>[...p,{r:"thinking",c:"실행 조건을 검증하고 있어요..."}]);
    setTimeout(()=>{
      const res=readinessValidate(sc);
      setResult(res);
      let ai="실행 전 검증이 완료되었어요.\n\n";
      ai+="✅ 통과: "+res.passCount+"건";
      if(res.warnCount>0)ai+="  ⚠ 주의: "+res.warnCount+"건";
      if(res.failCount>0)ai+="  🔴 실패: "+res.failCount+"건";
      ai+="\n\n📊 구매 단계: "+res.bjSteps.length+"단계 · 약 "+res.estDays+"일 소요\n";
      ai+="📋 승인: "+sc.approvalPath+"\n";
      ai+="📁 데이터 수준: "+res.dataLevel.label;
      if(res.docsCount>0)ai+="\n📎 첨부문서 검증: "+res.docsCount+"건";
      if(sc.route==="B")ai+="\n\n📄 기존 계약 범위 내 발주입니다. 조건 점검을 건너뛰었어요.";
      if(res.canProceed)ai+="\n\n실행 조건이 충족되었어요. \"실행 시작\"을 눌러주세요.";
      else{ai+="\n\n🔴 "+res.failCount+"건 보완이 필요해요.";setState5("HUMAN_REVIEW_REQUIRED");logEvent({type:"VALIDATION_REVIEW",from:"IN_PROGRESS",to:"HUMAN_REVIEW_REQUIRED",trigger:"VLD",engine:"T03+T05+T06",payload:{failCount:res.failCount}});}
      setMsgs(p=>p.filter(m=>m.r!=="thinking").concat([{r:"ai",c:ai,engine:"T03+T05+T06"}]));
      setBusy(false);
    },1500);
  };

  const confirmValidation=()=>{
    setConfirmed(true);setState5("COMPLETED");
    logEvent({type:"EXECUTION_CONFIRMED",from:state5,to:"COMPLETED",trigger:"user",engine:"VLD",payload:{gtCode:result?.gt?.code,passCount:result?.passCount,canProceed:result?.canProceed}});
    setMsgs(p=>[...p,{r:"ai",c:"🚀 실행이 확정되었어요!\n\n구매 진행을 시작합니다.\n구매담당자(조성호 과장)에게 전달됩니다.",engine:"T03+T05+T06",done:true}]);
  };

  const curRoute=scenario?.route||"C";

  return(<div style={{width:"100%",height:"100vh",display:"flex",flexDirection:"column",fontFamily:T.font.sans,background:T.surfAlt,color:T.text.primary}}>
    <div style={{height:48,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px",borderBottom:"1px solid "+T.border.light,background:T.surface,flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:28,height:28,borderRadius:8,background:"linear-gradient(135deg,"+T.brand+","+T.brandLt+")",display:"flex",alignItems:"center",justifyContent:"center",color:"#FFF",fontSize:11,fontWeight:700}}>BSM</div>
        <span style={{fontSize:15,fontWeight:700}}>실행 전 검증</span>
        <Badge color={state5==="COMPLETED"?"#166534":"#1E40AF"} bg={state5==="COMPLETED"?"#F0FDF4":"#EFF6FF"}>{state5==="COMPLETED"?"검증 완료":"Readiness Check"}</Badge>
        {scenario&&<Badge color={curRoute==="B"?"#1E3A8A":curRoute==="D"?"#991B1B":"#5B21B6"} bg={curRoute==="B"?"#DBEAFE":curRoute==="D"?"#FEE2E2":"#EDE9FE"}>경로 {curRoute}</Badge>}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {draftStatus==="saving"&&<span style={{fontSize:10,color:T.text.muted}}>💾 저장 중...</span>}
        {draftStatus==="saved"&&<span style={{fontSize:10,color:T.state.complete.fg}}>✅ 임시저장 {draftTs}</span>}
        {started&&<button onClick={resetAll} style={{padding:"4px 10px",borderRadius:T.radius.sm,border:"1px solid "+T.border.medium,background:T.surface,color:T.text.secondary,fontSize:11,fontWeight:600,cursor:"pointer"}}>↩ 처음으로</button>}
        <span style={{fontSize:12,color:T.text.muted}}>김형주 과장 (IT팀)</span>
        <div style={{width:28,height:28,borderRadius:T.radius.full,background:T.state.progress.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:600,color:T.state.progress.fg}}>김</div>
      </div>
    </div>

    <div style={{flex:1,display:"flex",overflow:"hidden"}}>
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
        {/* 경로별 동적 Breadcrumb */}
        <div style={{padding:"8px 20px",borderBottom:"1px solid "+T.border.light,background:T.surface,display:"flex",alignItems:"center",gap:6,fontSize:12,flexWrap:"wrap"}}>
          <span style={{color:"#22C55E",fontWeight:600}}>① Explore</span><span style={{color:T.text.muted}}>→</span>
          <span style={{color:"#22C55E",fontWeight:600}}>② 요건</span><span style={{color:T.text.muted}}>→</span>
          {curRoute==="B"?(
            <><span style={{color:T.text.muted,textDecoration:"line-through"}}>③ 조건 점검 (건너뜀)</span><span style={{color:T.text.muted}}>→</span></>
          ):(
            <><span style={{color:"#22C55E",fontWeight:600}}>③ 조건 점검</span><span style={{color:T.text.muted}}>→</span></>
          )}
          <span style={{color:"#3B82F6",fontWeight:700}}>④ 사전 검증</span><span style={{color:T.text.muted}}>→</span>
          <span style={{color:T.text.muted}}>⑤ Execute</span>
        </div>

        <div ref={ref} style={{flex:1,overflowY:"auto",padding:20,display:"flex",flexDirection:"column",gap:12}}>
          {!started&&(
            <div style={{maxWidth:560,margin:"40px auto",textAlign:"center"}}>
              <div style={{fontSize:40,marginBottom:12}}>🛡</div>
              <div style={{fontSize:20,fontWeight:700,marginBottom:6}}>사전 검증</div>
              <div style={{fontSize:14,color:T.text.secondary,marginBottom:20,lineHeight:1.7}}>Execute 진입 전 최종 점검. 누락 정보, 정책 충돌, 첨부문서, 실행 경로를 검증합니다.</div>
              {["D","C","B"].map(r=>{
                const scs=SCENARIOS.filter(s=>s.route===r);
                if(!scs.length)return null;
                const label=r==="D"?"경로 D · 3차 (11→12)":r==="C"?"경로 C · 2차 (11→12)":"경로 B · 계약발주 (10→12, 11 건너뜀)";
                return(<div key={r} style={{marginBottom:16}}>
                  <div style={{fontSize:12,fontWeight:600,color:r==="D"?"#991B1B":r==="C"?"#5B21B6":"#1E3A8A",marginBottom:6}}>{label}</div>
                  <div style={{display:"flex",flexDirection:"column",gap:4}}>
                    {scs.map(sc=>(
                      <button key={sc.id} onClick={()=>pick(sc)} style={{padding:"10px 14px",borderRadius:T.radius.md,border:"1px solid "+T.border.light,background:T.surface,cursor:"pointer",textAlign:"left"}}>
                        <div style={{display:"flex",justifyContent:"space-between"}}>
                          <span style={{fontSize:13,fontWeight:600}}>{sc.label}</span>
                          <Badge color={r==="D"?"#991B1B":r==="C"?"#5B21B6":"#1E3A8A"} bg={r==="D"?"#FEE2E2":r==="C"?"#EDE9FE":"#DBEAFE"}>{sc.gt.code}</Badge>
                        </div>
                        <div style={{fontSize:11,color:T.text.muted,marginTop:2}}>{sc.approvalPath} · 정책 {sc.policySignals}건{r==="B"?" · 11 건너뜀":""}</div>
                      </button>
                    ))}
                  </div>
                </div>);
              })}
            </div>
          )}

          {msgs.map((m,i)=>(
            <div key={i} style={{display:"flex",gap:10,maxWidth:"85%",alignSelf:m.r==="user"?"flex-end":"flex-start"}}>
              {m.r!=="user"&&<AiAvatar v={m.done?"done":m.r==="thinking"?"thinking":"ai"}/>}
              <div style={{padding:"10px 14px",borderRadius:T.radius.lg,background:m.r==="sys"?T.surfAlt:m.r==="thinking"?"#F0FDF4":T.surface,
                color:T.text.primary,fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap",border:"1px solid "+T.border.light,boxShadow:T.shadow.sm}}>
                {m.c}
                {m.engine&&<div style={{marginTop:6,fontSize:10,color:T.text.muted}}>Engine: {m.engine}</div>}
              </div>
            </div>
          ))}
          {busy&&<div style={{display:"flex",gap:10}}><AiAvatar v="thinking"/><div style={{padding:"10px 14px",borderRadius:T.radius.lg,background:"#F0FDF4",border:"1px solid "+T.state.complete.border,fontSize:13,color:T.state.complete.fg}}>실행 가능성을 검증하고 있어요...</div></div>}
        </div>
      </div>

      {/* Right Panel */}
      {result&&(
        <div style={{width:400,background:T.surface,borderLeft:"1px solid "+T.border.light,display:"flex",flexDirection:"column",flexShrink:0}}>
          <div style={{padding:"10px 14px",borderBottom:"2px solid "+(result.canProceed?T.state.complete.accent:T.state.blocked.accent)}}>
            <div style={{fontSize:14,fontWeight:700,color:result.canProceed?T.state.complete.fg:T.state.blocked.fg}}>🛡 사전 검증 결과</div>
            <div style={{fontSize:11,color:T.text.muted}}>Readiness · {scenario?.gt.code} · 경로 {curRoute}{curRoute==="B"?" (11 건너뜀)":""}</div>
          </div>

          <div style={{flex:1,overflowY:"auto",padding:12,display:"flex",flexDirection:"column",gap:8}}>
            {/* GT 확정 */}
            <div style={{padding:12,borderRadius:T.radius.md,background:T.state.progress.bg,border:"2px solid "+T.state.progress.accent}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontSize:16,fontWeight:700,color:T.state.progress.fg}}>{result.gt.code}</div><div style={{fontSize:13,color:T.state.progress.fg}}>{result.gt.name}</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:20,fontWeight:700,color:T.state.progress.fg}}>{Math.round(result.confidence*100)}%</div><div style={{fontSize:10,color:T.state.progress.fg,opacity:.7}}>Confidence</div></div>
              </div>
            </div>

            {/* 경로 B: 계약 정보 강조 */}
            {curRoute==="B"&&(
              <div style={{padding:10,borderRadius:T.radius.md,background:"#EFF6FF",border:"2px solid #93C5FD"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#1E3A8A",marginBottom:2}}>📄 경로 B — 기존 계약 기반</div>
                <div style={{fontSize:12,color:"#1E3A8A"}}>조건·정책 점검(11)을 건너뛴 계약 발주입니다.<br/>계약 범위 내 조건이 내재되어 있습니다.</div>
              </div>
            )}

            {/* 요약 */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
              <div style={{padding:8,borderRadius:T.radius.md,background:T.state.complete.bg,textAlign:"center"}}><div style={{fontSize:18,fontWeight:700,color:T.state.complete.fg}}>{result.passCount}</div><div style={{fontSize:10,color:T.state.complete.fg}}>통과</div></div>
              <div style={{padding:8,borderRadius:T.radius.md,background:result.warnCount>0?T.state.review.bg:T.surfAlt,textAlign:"center"}}><div style={{fontSize:18,fontWeight:700,color:result.warnCount>0?T.state.review.fg:T.text.muted}}>{result.warnCount}</div><div style={{fontSize:10,color:result.warnCount>0?T.state.review.fg:T.text.muted}}>주의</div></div>
              <div style={{padding:8,borderRadius:T.radius.md,background:result.failCount>0?T.state.blocked.bg:T.surfAlt,textAlign:"center"}}><div style={{fontSize:18,fontWeight:700,color:result.failCount>0?T.state.blocked.fg:T.text.muted}}>{result.failCount}</div><div style={{fontSize:10,color:result.failCount>0?T.state.blocked.fg:T.text.muted}}>실패</div></div>
            </div>

            {/* 검증 항목 */}
            {[...new Set(result.checks.map(c=>c.cat))].map(cat=>{
              const items=result.checks.filter(c=>c.cat===cat);
              return(<div key={cat} style={{padding:10,borderRadius:T.radius.md,border:"1px solid "+T.border.light}}>
                <div style={{fontSize:11,fontWeight:600,color:T.text.secondary,marginBottom:6}}>{cat}</div>
                {items.map(c=>(<div key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid "+T.border.light}}>
                  <div style={{width:18,height:18,borderRadius:T.radius.full,background:c.severity==="pass"?T.state.complete.accent:c.severity==="warn"?T.state.review.accent:T.state.blocked.accent,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <span style={{color:"#FFF",fontSize:10,fontWeight:700}}>{c.severity==="pass"?"✓":c.severity==="warn"?"!":"✗"}</span>
                  </div>
                  <div style={{flex:1}}><div style={{fontSize:12,fontWeight:500,color:T.text.primary}}>{c.label}</div>{c.fix&&<div style={{fontSize:10,color:c.severity==="fail"?T.state.blocked.fg:T.state.review.fg}}>{c.fix}</div>}</div>
                </div>))}
              </div>);
            })}

            {/* BJ 미리보기 */}
            <div style={{padding:10,borderRadius:T.radius.md,border:"1px solid "+T.state.progress.border,background:T.state.progress.bg}}>
              <div style={{fontSize:11,fontWeight:600,color:T.state.progress.fg,marginBottom:8}}>📊 Buying Journey ({result.bjSteps.length}단계, ~{result.estDays}일)</div>
              {result.bjSteps.map((step,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <div style={{width:22,height:22,borderRadius:T.radius.full,background:T.state.progress.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#FFF",flexShrink:0}}>{i+1}</div>
                  <span style={{fontSize:12,fontWeight:600,color:T.state.progress.fg}}>{step.toUpperCase()}</span>
                  <span style={{fontSize:11,color:T.state.progress.fg,opacity:.8}}>{BJ_STEP_LABELS[step]||""}</span>
                </div>
              ))}
            </div>

            {/* 시스템 */}
            <div style={{padding:8,borderRadius:T.radius.sm,background:T.surfAlt,border:"1px dashed "+T.border.light}}>
              <div style={{fontSize:10,fontWeight:600,color:T.text.muted,marginBottom:2}}>🔧 시스템 (DEV)</div>
              <div style={{fontSize:11,color:T.text.muted,lineHeight:1.5}}>
                GT: {result.gt.code} · Route: {curRoute}{curRoute==="B"?" (11 skip)":""}<br/>
                DataLevel: {result.dataLevel.label}<br/>
                Docs: {result.docsCount}건 검증<br/>
                Checks: {result.checks.length} (P:{result.passCount} W:{result.warnCount} F:{result.failCount})<br/>
                BJ: {result.bjSteps.join("→")} · BT: {scenario?.btCode} ({BT_META[scenario?.btCode]?.name||''})<br/>
                State: {state5}
              </div>
            </div>

            {/* 버튼 */}
            {!confirmed&&result.canProceed&&(
              <button onClick={confirmValidation} style={{width:"100%",padding:"14px",borderRadius:T.radius.md,border:"none",background:"linear-gradient(135deg,"+T.brand+","+T.brandLt+")",color:"#FFF",fontSize:15,fontWeight:700,cursor:"pointer",marginTop:4,boxShadow:"0 4px 12px rgba(30,58,138,.3)"}}>
                🚀 실행 시작 → Execute (A05~)
              </button>
            )}
            {!confirmed&&!result.canProceed&&(
              <button disabled style={{width:"100%",padding:"14px",borderRadius:T.radius.md,border:"none",background:T.state.blocked.bg,color:T.state.blocked.fg,fontSize:14,fontWeight:600,marginTop:4}}>
                🔴 {result.failCount}건 보완 필요 — 실행 불가
              </button>
            )}
            {confirmed&&(
              <div style={{padding:14,borderRadius:T.radius.md,background:T.state.complete.bg,border:"2px solid "+T.state.complete.accent,textAlign:"center"}}>
                <div style={{fontSize:16,fontWeight:700,color:T.state.complete.fg}}>🚀 실행 확정</div>
                <div style={{fontSize:13,color:T.state.complete.fg,marginTop:4}}>{result.gt.code} · {result.bjSteps.length}단계<br/>구매담당자(조성호 과장)에게 전달됨</div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
